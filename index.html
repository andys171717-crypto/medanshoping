<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TembungShoping</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
padding-top:75px;
padding-bottom:80px;
}

.header{
background:#2c3e50;
padding:12px;
display:flex;
align-items:center;
gap:12px;
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
box-sizing:border-box;
}

.search{
flex:1;
height:42px;
padding:0 16px;
border-radius:25px;
border:none;
outline:none;
font-size:14px;
}

.icon{
font-size:24px;
color:white;
cursor:pointer;
position:relative;
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
}

.cart-count{
position:absolute;
top:-4px;
right:-6px;
background:red;
color:white;
font-size:11px;
padding:2px 6px;
border-radius:50%;
}

.menu{
display:grid;
grid-template-columns:repeat(5,1fr);
background:white;
padding:10px;
text-align:center;
font-size:14px;
}

.circle{
width:45px;
height:45px;
background:#3b4f63;
border-radius:50%;
margin:auto;
margin-bottom:5px;
}

.products{
padding:12px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.product{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
position:relative;
}

.product img{
width:100%;
height:170px;
object-fit:cover;
}

.badge{
position:absolute;
top:8px;
left:8px;
background:#ff3b30;
color:white;
font-size:11px;
padding:3px 6px;
border-radius:6px;
}

.wishlist{
position:absolute;
top:8px;
right:8px;
background:white;
border-radius:50%;
padding:6px;
font-size:14px;
}

.info{
padding:10px;
}

.info b{
font-size:16px;
display:block;
margin-bottom:4px;
line-height:1.3;
height:38px;
overflow:hidden;
}

.rating{
color:#ffb400;
font-size:14px;
}

.sold{
font-size:12px;
color:#777;
}

.free{
font-size:11px;
color:#27ae60;
font-weight:bold;
margin:4px 0;
}

.price{
color:#e74c3c;
font-size:20px;
font-weight:bold;
margin:6px 0;
}

button{
border:none;
background:#27ae60;
color:white;
border-radius:10px;
padding:10px;
cursor:pointer;
width:100%;
}

.qty-control{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
padding:10px;
}

.qty-control button{
width:35px;
height:35px;
padding:0;
font-size:18px;
}

.qty-input{
width:40px;
text-align:center;
border:none;
background:#eee;
border-radius:6px;
height:32px;
}

.cart-popup{
position:fixed;
top:0;
right:-100%;
width:80%;
height:100%;
background:white;
padding:20px;
transition:0.3s;
overflow:auto;
z-index:1000;
}

.cart-popup.active{
right:0;
}

.close-cart{
background:#e74c3c;
margin-bottom:10px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
height:65px;
box-shadow:0 -3px 12px rgba(0,0,0,0.08);
z-index:999;
}

.bottom div{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
cursor:pointer;
}

.icon-bottom{
font-size:22px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.popup-box{
background:white;
padding:25px;
border-radius:12px;
text-align:center;
width:80%;
}

.popup button{
margin-top:15px;
background:#2c3e50;
}

</style>
</head>

<body>

<div class="header">

<input class="search" id="search" placeholder="Cari produk di TembungShoping">

<div class="icon" onclick="toggleCart()">🛒
<span id="cartcount" class="cart-count">0</span>
</div>

<div class="icon" onclick="chatAdmin()">💬</div>

</div>

<div class="menu">
<div onclick="devAlert()"><div class="circle"></div>Pulsa</div>
<div onclick="devAlert()"><div class="circle"></div>Promo</div>
<div onclick="devAlert()"><div class="circle"></div>Game</div>
<div onclick="devAlert()"><div class="circle"></div>Live</div>
<div onclick="devAlert()"><div class="circle"></div>Lainnya</div>
</div>

<div class="products" id="products"></div>

<div class="cart-popup" id="cartpopup">
<button class="close-cart" onclick="toggleCart()">Tutup</button>
<h2>Keranjang</h2>
<div id="cartitems"></div>
</div>

<div class="bottom">
<div onclick="menuHome()"><span class="icon-bottom">🏠</span>Beranda</div>
<div onclick="devAlert()"><span class="icon-bottom">📺</span>Live</div>
<div onclick="devAlert()"><span class="icon-bottom">🔔</span>Notifikasi</div>
<div onclick="devAlert()"><span class="icon-bottom">👤</span>Akun</div>
</div>

<div class="popup" id="popup">
<div class="popup-box">
<h3>🚀 Fitur Segera Hadir</h3>
<p>Kami sedang menyiapkan fitur ini untuk pengalaman belanja yang lebih baik.</p>
<button onclick="closePopup()">Mengerti</button>
</div>
</div>

<script>

const produk=[
{nama:"Sepatu Nike Sport",harga:100000,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400",sold:"1.2k"},
{nama:"Headphone Wireless",harga:200000,img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400",sold:"950"},
{nama:"Jam Tangan Smartwatch",harga:150000,img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400",sold:"870"},
{nama:"Tas Pria Premium",harga:180000,img:"https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=400",sold:"1k"},
{nama:"Kacamata Fashion",harga:90000,img:"https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=400",sold:"700"},
{nama:"Mouse Gaming RGB",harga:120000,img:"https://images.unsplash.com/photo-1587202372775-e229f172b9d7?w=400",sold:"860"},
{nama:"Keyboard Mechanical",harga:250000,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=400",sold:"640"},
{nama:"Speaker Bluetooth",harga:175000,img:"https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=400",sold:"530"}
]

let produkTampil=[...produk]

let cart=JSON.parse(localStorage.getItem("cart"))||[]

function rupiah(x){
return Number(x).toLocaleString("id-ID")
}

function tampilProduk(){

let html=""

produkTampil.forEach(p=>{

html+=`

<div class="product">

<div class="badge">-30%</div>

<div class="wishlist">❤️</div>

<img src="${p.img}">

<div class="info">

<b>${p.nama}</b>

<div class="rating">⭐⭐⭐⭐☆</div>

<div class="sold">Terjual ${p.sold}</div>

<div class="free">Gratis Ongkir</div>

<div class="price">Rp${rupiah(p.harga)}</div>

</div>

<div class="qty-control">

<button onclick="minusQty('${p.nama}',${p.harga},this)">-</button>

<input class="qty-input" value="0" readonly>

<button onclick="plusQty('${p.nama}',${p.harga},this)">+</button>

</div>

</div>

`

})

document.getElementById("products").innerHTML=html

syncQty()

}

document.getElementById("search").addEventListener("input",function(){

let key=this.value.toLowerCase()

produkTampil=produk.filter(p=>p.nama.toLowerCase().includes(key))

tampilProduk()

})

function menuHome(){

document.getElementById("search").value=""

produkTampil=[...produk]

tampilProduk()

window.scrollTo({top:0,behavior:"smooth"})

}

function syncQty(){

document.querySelectorAll(".product").forEach(box=>{

let nama=box.querySelector("b").innerText

let input=box.querySelector(".qty-input")

let qty=cart.filter(i=>i.nama==nama).length

input.value=qty

})

}

function renderCart(){

let data={}
cart.forEach(item=>{
if(!data[item.nama]){
data[item.nama]={harga:item.harga,qty:0}
}
data[item.nama].qty++
})

let html=""
let total=0

for(let nama in data){

let item=data[nama]

let subtotal=item.harga*item.qty

total+=subtotal

html+=`
<div style="border-bottom:1px solid #eee;padding:10px 0">
<b>${nama}</b><br>
Qty : ${item.qty}<br>
Subtotal : <b>Rp${rupiah(subtotal)}</b>
</div>
`

}

html+=`
<div style="margin-top:15px">
<h3>Total : Rp${rupiah(total)}</h3>
<button onclick="checkoutWA()">Checkout WhatsApp</button>
</div>
`

document.getElementById("cartitems").innerHTML=html
document.getElementById("cartcount").innerText=cart.length

localStorage.setItem("cart",JSON.stringify(cart))

}

function plusQty(nama,harga,btn){

let box=btn.parentElement
let input=box.querySelector(".qty-input")

let qty=parseInt(input.value)
qty++

input.value=qty

cart.push({nama,harga})

renderCart()

}

function minusQty(nama,harga,btn){

let box=btn.parentElement
let input=box.querySelector(".qty-input")

let qty=parseInt(input.value)

if(qty>0){

qty--
input.value=qty

for(let i=0;i<cart.length;i++){
if(cart[i].nama==nama){
cart.splice(i,1)
break
}
}

renderCart()

}

}

function toggleCart(){

let popup=document.getElementById("cartpopup")

popup.classList.toggle("active")

}

function checkoutWA(){

let pesan="Halo Admin,%0ASaya ingin memesan:%0A"

cart.forEach(i=>{
pesan+=`${i.nama} - Rp${rupiah(i.harga)}%0A`
})

window.open("https://wa.me/6281220549530?text="+pesan)

}

function chatAdmin(){
window.open("https://wa.me/6281220549530")
}

function devAlert(){
document.getElementById("popup").style.display="flex"
}

function closePopup(){
document.getElementById("popup").style.display="none"
}

tampilProduk()
renderCart()

</script>

</body>
</html>
