<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medanshoping</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#ff6600;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
font-size:20px;
}

.cart{
background:white;
color:#ff6600;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.search{
padding:15px;
}

.search input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

.price{
color:green;
font-weight:bold;
}

button{
background:#ff6600;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
margin-top:8px;
cursor:pointer;
}

#cartBox{
position:fixed;
top:0;
right:-100%;
width:280px;
height:100%;
background:white;
box-shadow:-3px 0 8px rgba(0,0,0,0.3);
padding:15px;
transition:0.3s;
overflow:auto;
}
</style>
</head>

<body>

<header>
🛒 Medanshoping
<div class="cart" onclick="bukaCart()">Keranjang (<span id="totalCart">0</span>)</div>
</header>

<div class="search">
<input type="text" placeholder="Cari produk..." onkeyup="cariProduk(this.value)">
</div>

<div class="products" id="productList"></div>

<div id="cartBox">
<h2>Keranjang</h2>
<div id="cartItems"></div>
<br>
<button onclick="tutupCart()">Tutup</button>
</div>

<script>

let produk=[

{
nama:"Baju Fashion",
harga:120000,
gambar:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500"
},

{
nama:"Tas Wanita",
harga:150000,
gambar:"https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500"
},

{
nama:"Sepatu Trend",
harga:200000,
gambar:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500"
},

{
nama:"Jaket Pria",
harga:250000,
gambar:"https://images.unsplash.com/photo-1520975661595-6453be3f7070?w=500"
}

]

let keranjang=[]

function tampilProduk(data){

let html=""

data.forEach((p,i)=>{

html+=`

<div class="card">

<img src="${p.gambar}">

<h3>${p.nama}</h3>

<p class="price">Rp${p.harga.toLocaleString()}</p>

<button onclick="beli(${i})">Beli</button>

</div>

`

})

document.getElementById("productList").innerHTML=html

}

function beli(i){

keranjang.push(produk[i])

updateCart()

alert(produk[i].nama+" ditambahkan ke keranjang")

}

function updateCart(){

document.getElementById("totalCart").innerText=keranjang.length

let html=""

keranjang.forEach((p)=>{

html+=`<p>${p.nama} - Rp${p.harga.toLocaleString()}</p>`

})

document.getElementById("cartItems").innerHTML=html

}

function bukaCart(){
document.getElementById("cartBox").style.right="0"
}

function tutupCart(){
document.getElementById("cartBox").style.right="-100%"
}

function cariProduk(text){

let hasil=produk.filter(p=>p.nama.toLowerCase().includes(text.toLowerCase()))

tampilProduk(hasil)

}

tampilProduk(produk)

</script>

</body>
</html>
