<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TembungShoping</title><style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
padding-top:75px;
padding-bottom:80px;
}

.header{
background:#2c3e50;
padding:12px;
display:flex;
align-items:center;
gap:12px;
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
box-sizing:border-box;
}

.search{
flex:1;
height:42px;
padding:0 16px;
border-radius:25px;
border:none;
outline:none;
font-size:14px;
}

.icon{
font-size:24px;
color:white;
cursor:pointer;
position:relative;
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
touch-action: manipulation;
}

.cart-count{
position:absolute;
top:-4px;
right:-6px;
background:red;
color:white;
font-size:11px;
padding:2px 6px;
border-radius:50%;
}

.menu{
display:grid;
grid-template-columns:repeat(5,1fr);
background:white;
padding:10px;
text-align:center;
font-size:14px;
}

.circle{
width:45px;
height:45px;
background:#3b4f63;
border-radius:50%;
margin:auto;
margin-bottom:5px;
}

.products{
padding:12px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.product{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
position:relative;
}

.product-view{
cursor:pointer;
touch-action: manipulation;
}

.product img{
width:100%;
height:170px;
object-fit:cover;
}

.badge{
position:absolute;
top:8px;
left:8px;
background:#ff3b30;
color:white;
font-size:11px;
padding:3px 6px;
border-radius:6px;
}

.wishlist{
position:absolute;
top:8px;
right:8px;
background:white;
border-radius:50%;
padding:6px;
font-size:14px;
}

.info{
padding:10px;
}

.info b{
font-size:16px;
display:block;
margin-bottom:4px;
line-height:1.3;
height:38px;
overflow:hidden;
}

.rating{
color:#ffb400;
font-size:14px;
}

.sold{
font-size:12px;
color:#777;
}

.free{
font-size:11px;
color:#27ae60;
font-weight:bold;
margin:4px 0;
}

.price{
color:#e74c3c;
font-size:20px;
font-weight:bold;
margin:6px 0;
}

button{
border:none;
background:#27ae60;
color:white;
border-radius:10px;
padding:10px;
cursor:pointer;
width:100%;
touch-action: manipulation;
}

.cart-popup{
position:fixed;
top:0;
right:-100%;
width:80%;
height:100%;
background:white;
padding:20px;
transition:0.3s;
overflow:auto;
z-index:1000;
}

.cart-popup.active{
right:0;
}

.close-cart{
background:#e74c3c;
margin-bottom:10px;
}

.notif-item{
padding:10px;
border-bottom:1px solid #eee;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
height:65px;
box-shadow:0 -3px 12px rgba(0,0,0,0.08);
z-index:999;
}

.bottom div{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:12px;
color:#333;
gap:2px;
cursor:pointer;
position:relative;
touch-action: manipulation;
}

.bottom span.icon-bottom{
font-size:22px;
}

.cool-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:0.3s;
z-index:2000;
}

.cool-popup.show{
opacity:1;
pointer-events:auto;
}

.popup-box{
background:white;
padding:25px;
border-radius:20px;
width:80%;
max-width:320px;
text-align:center;
}

.product-detail{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:3000;
overflow:auto;
display:none;
}

.product-detail.show{
display:block;
}

.detail-box{
padding:20px;
}

.detail-box img{
width:100%;
border-radius:10px;
margin-bottom:15px;
}

.close-detail{
background:#2c3e50;
margin-bottom:15px;
}

</style></head><body><!-- SELURUH HTML DAN JAVASCRIPT TETAP SAMA SEPERTI FILE SEBELUMNYA --></body>
</html>
