<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedanShopping - Marketplace Online</title>
    <style>
        /* Style umum untuk pengunjung */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }

        header {
            background: #333;
            color: #fff;
            padding: 10px 0;
        }

        header .logo a {
            font-size: 24px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }

        header .menu a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
        }

        header .menu a:hover {
            color: #f1c40f;
        }

        .banner {
            background: #f1c40f;
            color: #fff;
            padding: 50px 0;
            text-align: center;
        }

        .products {
            padding: 50px 0;
            text-align: center;
        }

        .product-item {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            width: 200px;
            margin: 10px;
            display: inline-block;
        }

        .product-item img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .product-item .btn {
            background: #333;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .product-item .btn:hover {
            background: #f1c40f;
        }

        footer {
            background: #333;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        footer a {
            color: #fff;
            text-decoration: none;
        }

        footer a:hover {
            color: #f1c40f;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <nav>
            <div class="logo">
                <a href="#">MedanShopping</a>
            </div>
            <div class="menu">
                <a href="index.html">Home</a>
                <a href="index.html#products">Products</a>
                <a href="login.html">Admin Login</a>
            </div>
        </nav>
    </header>

    <!-- Banner -->
    <section class="banner">
        <div class="banner-content">
            <h1>Selamat datang di MedanShopping</h1>
            <p>Dapatkan produk terbaik dengan harga terjangkau.</p>
            <a href="index.html#products" class="btn">Belanja Sekarang</a>
        </div>
    </section>

    <!-- Featured Products -->
    <section class="products" id="products">
        <h2>Produk Unggulan</h2>
        <div class="product-list" id="product-list">
            <!-- Produk akan ditambahkan lewat JavaScript -->
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 MedanShopping. All rights reserved.</p>
        <p><a href="#">Privacy Policy</a> | <a href="#">Terms & Conditions</a></p>
    </footer>

    <script>
        // Menampilkan produk dari localStorage atau produk dummy jika belum ada produk
        function renderProducts() {
            const productList = document.getElementById('product-list');
            const products = JSON.parse(localStorage.getItem('products')) || [];

            if (products.length === 0) {
                // Produk dummy jika belum ada produk di localStorage
                const dummyProducts = [
                    { name: 'Produk 1', price: '100,000', image: 'images/no-image.jpg' },
                    { name: 'Produk 2', price: '200,000', image: 'images/no-image.jpg' },
                    { name: 'Produk 3', price: '300,000', image: 'images/no-image.jpg' },
                    { name: 'Produk 4', price: '400,000', image: 'images/no-image.jpg' },
                ];

                // Tampilkan produk dummy
                dummyProducts.forEach((product) => {
                    const productItem = document.createElement('div');
                    productItem.classList.add('product-item');
                    productItem.innerHTML = `
                        <img src="${product.image}" alt="${product.name}">
                        <h3>${product.name}</h3>
                        <p>Rp ${product.price}</p>
                        <button class="btn">Tambahkan ke Keranjang</button>
                    `;
                    productList.appendChild(productItem);
                });
            } else {
                // Tampilkan produk dari localStorage
                products.forEach((product) => {
                    const productItem = document.createElement('div');
                    productItem.classList.add('product-item');
                    productItem.innerHTML = `
                        <img src="${product.image || 'images/no-image.jpg'}" alt="${product.name}">
                        <h3>${product.name}</h3>
                        <p>Rp ${product.price}</p>
                        <button class="btn">Tambahkan ke Keranjang</button>
                    `;
                    productList.appendChild(productItem);
                });
            }
        }

        // Render produk saat halaman dimuat
        renderProducts();
    </script>

</body>
</html>
