<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TembungShoping</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:system-ui;
background:#f5f5f5;
padding-top:60px;
padding-bottom:70px;
}

/* HEADER */

.header{
position:fixed;
top:0;
width:100%;
height:55px;
background:#ff5722;
display:flex;
align-items:center;
padding:0 10px;
z-index:999;
gap:8px;
}

.search{
flex:1;
height:34px;
border:none;
border-radius:20px;
padding:0 14px;
font-size:13px;
}

.icon{
color:white;
font-size:18px;
width:25px;
text-align:center;
position:relative;
}

.badge{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
font-size:10px;
padding:2px 6px;
border-radius:50%;
}

/* BANNER */

.banner{
margin:10px;
border-radius:12px;
overflow:hidden;
}

.banner img{
width:100%;
height:150px;
object-fit:cover;
}

/* CATEGORY */

.category{
display:flex;
overflow-x:auto;
gap:14px;
padding:12px;
background:white;
}

.category::-webkit-scrollbar{
display:none;
}

.cat{
text-align:center;
min-width:65px;
font-size:12px;
}

.circle{
width:44px;
height:44px;
border-radius:50%;
background:#eef1f4;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
margin:auto;
margin-bottom:5px;
}

/* PRODUCTS */

.products{
padding:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.product{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
position:relative;
}

.product img{
width:100%;
height:140px;
object-fit:cover;
cursor:pointer;
}

/* DISCOUNT BADGE */

.discount{
position:absolute;
top:8px;
left:8px;
background:red;
color:white;
font-size:11px;
padding:3px 6px;
border-radius:4px;
}

/* INFO */

.info{
padding:8px;
}

.title{
font-size:13px;
font-weight:600;
height:30px;
overflow:hidden;
}

.price{
color:#ff5722;
font-size:16px;
font-weight:bold;
}

.rating{
font-size:11px;
color:#f1c40f;
}

/* BUTTON */

.actions{
display:flex;
gap:5px;
padding:8px;
}

.btn{
flex:1;
border:none;
padding:7px;
border-radius:6px;
color:white;
font-size:13px;
cursor:pointer;
}

.like{background:#e74c3c;}
.cartbtn{background:#27ae60;}
.buy{background:#ff9800;}

/* DETAIL */

.detail{
display:none;
padding:12px;
}

.detail img{
width:100%;
border-radius:10px;
}

.detail-title{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.detail-price{
font-size:22px;
color:#ff5722;
font-weight:bold;
}

/* CART */

.cartpage{
display:none;
padding:12px;
}

.cart-item{
background:white;
padding:10px;
border-radius:8px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
}

/* BOTTOM */

.bottom{
position:fixed;
bottom:0;
width:100%;
height:60px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -2px 8px rgba(0,0,0,0.1);
font-size:11px;
}

.bottom i{
font-size:20px;
display:block;
margin-bottom:4px;
}

</style>

</head>

<body>

<div class="header">

<input class="search" id="search"
placeholder="Cari produk di TembungShoping">

<div class="icon">
<i class="fa-solid fa-bell"></i>
</div>

<div class="icon" onclick="openCart()">
<i class="fa-solid fa-cart-shopping"></i>
<span class="badge" id="cartcount">0</span>
</div>

</div>

<div class="banner">
<img id="bannerImg"
src="https://images.unsplash.com/photo-1607082349566-187342175e2f?w=900">
</div>

<div class="category">

<div class="cat"><div class="circle">📱</div>Pulsa</div>
<div class="cat"><div class="circle">🔥</div>Promo</div>
<div class="cat"><div class="circle">🎮</div>Game</div>
<div class="cat"><div class="circle">👕</div>Fashion</div>
<div class="cat"><div class="circle">💄</div>Beauty</div>

</div>

<div class="products" id="productList"></div>

<div class="detail" id="detailPage">

<button onclick="home()">⬅ kembali</button>

<img id="dimg">

<div class="detail-title" id="dtitle"></div>

<div class="detail-price" id="dprice"></div>

<button onclick="addCart(selected)"
style="width:100%;padding:12px;background:#27ae60;color:white;border:none;border-radius:8px">
Tambah Keranjang
</button>

</div>

<div class="cartpage" id="cartPage">

<h3>Keranjang</h3>

<div id="cartItems"></div>

<h3>Total: <span id="totalCart">Rp0</span></h3>

<button onclick="checkout()"
style="width:100%;padding:12px;background:#ff5722;color:white;border:none;border-radius:8px">
Checkout
</button>

</div>

<div class="bottom">

<div onclick="home()">
<i class="fa-solid fa-house"></i>
Home
</div>

<div>
<i class="fa-solid fa-fire"></i>
Promo
</div>

<div onclick="openCart()">
<i class="fa-solid fa-cart-shopping"></i>
Cart
</div>

<div>
<i class="fa-solid fa-user"></i>
Akun
</div>

</div>

<script>

/* PRODUK */

let productData=[

{name:"Sepatu Nike Sport",price:100000,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400"},
{name:"Headphone Wireless",price:200000,img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400"},
{name:"Smartwatch",price:150000,img:"https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b?w=400"},
{name:"Tas Fashion Wanita",price:250000,img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400"}

];

let cart=[];
let selected=0;

function rupiah(x){
return "Rp"+x.toLocaleString();
}

function loadProducts(list=productData){

let html="";

list.forEach((p,i)=>{

html+=`

<div class="product">

<div class="discount">-20%</div>

<img src="${p.img}" onclick="openDetail(${i})">

<div class="info">

<div class="title">${p.name}</div>

<div class="rating">⭐ ⭐ ⭐ ⭐ ☆</div>

<div class="price">${rupiah(p.price)}</div>

</div>

<div class="actions">

<button class="btn like">
<i class="fa-solid fa-heart"></i>
</button>

<button class="btn cartbtn"
onclick="addCart(${i})">
<i class="fa-solid fa-cart-shopping"></i>
</button>

<button class="btn buy"
onclick="buyNow(${i})">
Beli
</button>

</div>

</div>

`;

});

productList.innerHTML=html;

}

loadProducts();

/* SEARCH */

search.addEventListener("input",function(){

let key=this.value.toLowerCase();

let result=productData.filter(p=>
p.name.toLowerCase().includes(key)
);

loadProducts(result);

});

/* DETAIL */

function openDetail(i){

selected=i;

productList.style.display="none";
detailPage.style.display="block";
cartPage.style.display="none";

let p=productData[i];

dimg.src=p.img;
dtitle.innerText=p.name;
dprice.innerText=rupiah(p.price);

}

/* CART */

function addCart(i){

cart.push(productData[i]);

cartcount.innerText=cart.length;

alert("Produk masuk keranjang");

}

function openCart(){

productList.style.display="none";
detailPage.style.display="none";
cartPage.style.display="block";

renderCart();

}

function renderCart(){

let html="";
let total=0;

cart.forEach((c,i)=>{

html+=`

<div class="cart-item">

<div>
${c.name}<br>
<b>${rupiah(c.price)}</b>
</div>

<button onclick="removeCart(${i})">
Hapus
</button>

</div>

`;

total+=c.price;

});

cartItems.innerHTML=html;

totalCart.innerText=rupiah(total);

}

function removeCart(i){

cart.splice(i,1);

cartcount.innerText=cart.length;

renderCart();

}

/* BUY */

function buyNow(i){

alert("Menuju checkout produk");

addCart(i);

openCart();

}

function checkout(){

if(cart.length==0){

alert("Keranjang kosong");
return;

}

alert("Checkout berhasil!");

cart=[];
cartcount.innerText=0;

renderCart();

home();

}

function home(){

productList.style.display="grid";
detailPage.style.display="none";
cartPage.style.display="none";

}

</script>

</body>
</html>
