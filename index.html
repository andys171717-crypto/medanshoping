<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medanshoping</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f2f2f2;
        }

        header {
            background: #ff6600;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: white;
            color: #ff6600;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .banner {
            background: #ffd000;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            position: sticky;
            top: 50px;
            z-index: 99;
        }

        .search {
            padding: 15px;
            background-color: #ff6600;
        }

        .search input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background-color: #fff;
            color: #333;
        }

        .kategori {
            display: flex;
            gap: 10px;
            padding: 15px;
            background-color: #ff6600;
            position: sticky;
            top: 135px;
            z-index: 98;
        }

        .kategori button {
            border: 1px solid #ddd;
            background: #ff6600;
            padding: 6px 10px;
            border-radius: 20px;
            cursor: pointer;
            color: white;
        }

        .kategori button:hover {
            background-color: #ff9900;
        }

        /* Produk Section */
        .products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
        }

        .rating {
            color: orange;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        button {
            background: #ff6600;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .qty {
            display: flex;
            justify-content: center;
            gap: 6px;
            align-items: center;
            margin-top: 8px;
        }

        .qty input {
            width: 45px;
            text-align: center;
        }
    </style>
</head>

<body>

    <header>
        <span>🛒 Medanshoping</span>
        <div class="menu">
            <div class="btn">❤️</div>
            <div class="btn">Keranjang (0)</div>
            <div class="btn">Login</div>
        </div>
    </header>

    <div class="banner">
        🔥 Promo Medanshoping Diskon Sampai 70%!
    </div>

    <div class="search">
        <input type="text" placeholder="Cari produk...">
    </div>

    <div class="kategori">
        <button>Semua</button>
        <button>Fashion</button>
        <button>Tas</button>
        <button>Sepatu</button>
    </div>

    <div class="products" id="productList">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500" alt="Baju Fashion">
            <h3>Baju Fashion</h3>
            <div class="rating">⭐ 4.5</div>
            <p class="price">Rp120.000</p>
            <div class="qty">
                <button>-</button>
                <input type="number" value="1" min="1" max="99">
                <button>+</button>
            </div>
            <button>Tambah Keranjang</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500" alt="Tas Wanita">
            <h3>Tas Wanita</h3>
            <div class="rating">⭐ 4.6</div>
            <p class="price">Rp150.000</p>
            <div class="qty">
                <button>-</button>
                <input type="number" value="1" min="1" max="99">
                <button>+</button>
            </div>
            <button>Tambah Keranjang</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500" alt="Sepatu Trend">
            <h3>Sepatu Trend</h3>
            <div class="rating">⭐ 4.7</div>
            <p class="price">Rp200.000</p>
            <div class="qty">
                <button>-</button>
                <input type="number" value="1" min="1" max="99">
                <button>+</button>
            </div>
            <button>Tambah Keranjang</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1520975661595-6453be3f7070?w=500" alt="Jaket Pria">
            <h3>Jaket Pria</h3>
            <div class="rating">⭐ 4.8</div>
            <p class="price">Rp250.000</p>
            <div class="qty">
                <button>-</button>
                <input type="number" value="1" min="1" max="99">
                <button>+</button>
            </div>
            <button>Tambah Keranjang</button>
        </div>
    </div>

    <script>
        // Example script for functionality (cart, search, etc.)
        console.log("Product page loaded");
    </script>

</body>

</html>
