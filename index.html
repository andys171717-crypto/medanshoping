<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medanshoping Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        header {
            background-color: #FF6F00;
            padding: 10px 20px;
            text-align: center;
        }

        header img {
            width: 200px;
            height: auto;
        }

        header .promo {
            background-color: #FFEB3B;
            padding: 10px 0;
            color: black;
            font-weight: bold;
        }

        .menu {
            display: flex;
            justify-content: center;
            background-color: #FF6F00;
            padding: 10px 0;
        }

        .menu a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            font-size: 16px;
            text-transform: uppercase;
        }

        .menu a:hover {
            background-color: #ff8c00;
        }

        .product-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }

        .product-card {
            background-color: #fff;
            border: 1px solid #ddd;
            margin: 10px;
            width: 200px;
            text-align: center;
            border-radius: 10px;
            padding: 15px;
        }

        .product-card img {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .product-card h3 {
            margin: 10px 0;
        }

        .product-card .price {
            font-size: 18px;
            color: #4CAF50;
        }

        .product-card .rating {
            color: gold;
        }

        .product-card button {
            background-color: #FF6F00;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            border-radius: 5px;
        }

        .product-card button:hover {
            background-color: #e65100;
        }
    </style>
</head>
<body>
    <header>
        <img src="https://ibb.co/n4cfgJK" alt="Medanshoping Logo">
    </header>

    <div class="promo">
        <p>🔥 Promo Medanshoping Diskon Sampai 70%! 🔥</p>
    </div>

    <div class="menu">
        <a href="#">Semua</a>
        <a href="#">Fashion</a>
        <a href="#">Tas</a>
        <a href="#">Sepatu</a>
    </div>

    <div class="product-container">
        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Baju Fashion">
            <h3>Baju Fashion</h3>
            <p class="price">Rp 120.000</p>
            <p class="rating">⭐ 4.5</p>
            <button>Tambah Keranjang</button>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Tas Wanita">
            <h3>Tas Wanita</h3>
            <p class="price">Rp 150.000</p>
            <p class="rating">⭐ 4.6</p>
            <button>Tambah Keranjang</button>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Sepatu Trend">
            <h3>Sepatu Trend</h3>
            <p class="price">Rp 200.000</p>
            <p class="rating">⭐ 4.7</p>
            <button>Tambah Keranjang</button>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Jaket Pria">
            <h3>Jaket Pria</h3>
            <p class="price">Rp 250.000</p>
            <p class="rating">⭐ 4.8</p>
            <button>Tambah Keranjang</button>
        </div>
    </div>
</body>
</html>
