<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TembungShoping</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* HEADER */

.header{
background:#34495e;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.search{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}

.icon{
font-size:22px;
color:white;
cursor:pointer;
}

/* MENU */

.menu{
display:grid;
grid-template-columns:repeat(5,1fr);
background:white;
padding:10px;
text-align:center;
}

.menu-item{
font-size:12px;
}

.circle{
width:45px;
height:45px;
background:#34495e;
border-radius:50%;
margin:auto;
margin-bottom:5px;
}

/* PRODUK */

.products{
padding:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.product{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:140px;
object-fit:cover;
}

.info{
padding:8px;
}

.price{
color:#e74c3c;
font-weight:bold;
}

.rating{
font-size:12px;
color:orange;
}

button{
width:100%;
padding:6px;
border:none;
background:#27ae60;
color:white;
border-radius:5px;
margin-top:5px;
}

/* BOTTOM MENU */

.bottom{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 -2px 5px rgba(0,0,0,0.1);
}

.bottom div{
text-align:center;
font-size:12px;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<input class="search" id="search" placeholder="Cari produk di TembungShoping">

<div class="icon" onclick="cart()">🛒</div>
<div class="icon" onclick="chat()">💬</div>

</div>

<!-- MENU -->

<div class="menu">

<div class="menu-item">
<div class="circle"></div>
Pulsa
</div>

<div class="menu-item">
<div class="circle"></div>
Promo
</div>

<div class="menu-item">
<div class="circle"></div>
Game
</div>

<div class="menu-item">
<div class="circle"></div>
Live
</div>

<div class="menu-item">
<div class="circle"></div>
Lainnya
</div>

</div>

<!-- PRODUK -->

<div class="products" id="products">

<div class="product">

<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">

<div class="info">

<b>Sepatu Sport</b>

<div class="rating">
⭐⭐⭐⭐☆
</div>

<div class="price">
Rp100.000
</div>

<button onclick="addcart('Sepatu Sport')">
Tambah Keranjang
</button>

</div>

</div>


<div class="product">

<img src="https://images.unsplash.com/photo-1518441902117-bb3f7d7b14f1">

<div class="info">

<b>Headphone Gaming</b>

<div class="rating">
⭐⭐⭐⭐⭐
</div>

<div class="price">
Rp200.000
</div>

<button onclick="addcart('Headphone Gaming')">
Tambah Keranjang
</button>

</div>

</div>


<div class="product">

<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">

<div class="info">

<b>Jam Tangan</b>

<div class="rating">
⭐⭐⭐⭐☆
</div>

<div class="price">
Rp150.000
</div>

<button onclick="addcart('Jam Tangan')">
Tambah Keranjang
</button>

</div>

</div>


<div class="product">

<img src="https://images.unsplash.com/photo-1591561954557-26941169b49e">

<div class="info">

<b>Tas Fashion</b>

<div class="rating">
⭐⭐⭐⭐☆
</div>

<div class="price">
Rp180.000
</div>

<button onclick="addcart('Tas Fashion')">
Tambah Keranjang
</button>

</div>

</div>

</div>

<!-- MENU BAWAH -->

<div class="bottom">

<div onclick="home()">🏠<br>Beranda</div>

<div onclick="live()">📺<br>Live</div>

<div onclick="notif()">🔔<br>Notif</div>

<div onclick="akun()">👤<br>Akun</div>

</div>

<script>

let keranjang=[]

function addcart(nama){

keranjang.push(nama)

alert(nama+" ditambahkan ke keranjang")

}

function cart(){

alert("Isi keranjang : "+keranjang.join(", "))

}

function chat(){

alert("Chat penjual")

}

function home(){

alert("Beranda")

}

function live(){

alert("Live streaming")

}

function notif(){

alert("Tidak ada notifikasi")

}

function akun(){

alert("Halaman akun")

}

/* SEARCH */

document.getElementById("search").addEventListener("keyup",function(){

let input=this.value.toLowerCase()

let products=document.querySelectorAll(".product")

products.forEach(p=>{

let text=p.innerText.toLowerCase()

p.style.display=text.includes(input)?"block":"none"

})

})

</script>

</body>
</html>
