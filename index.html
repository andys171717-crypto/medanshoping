<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medanshoping</title>
    <style>
        /* Resetting body styles */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            padding: 0;
            box-sizing: border-box;
        }

        /* Header Styles */
        header {
            background-color: #ff6600;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 10;
        }

        header .logo {
            font-weight: bold;
            font-size: 24px;
        }

        header .menu {
            display: flex;
            gap: 10px;
        }

        header .btn {
            background-color: #ff6600;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #ff6600;
        }

        header .btn:hover {
            background-color: #e55b00;
        }

        /* Banner Styles */
        .banner {
            background-color: #ffd000;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            margin-top: 60px;
        }

        /* Search Bar Styles */
        .search input {
            width: 80%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background-color: #ff6600;
            color: white; /* Make text white */
            font-size: 16px;
        }

        /* Category Button Styles */
        .kategori {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .kategori button {
            background-color: #ff6600;
            color: white;
            border: 1px solid #ddd;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        .kategori button:hover {
            background-color: #ff9900;
        }

        /* Product Grid Styles */
        .products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 90px; /* Adjust for the header */
            padding: 0 15px;
        }

        .card {
            background-color: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            position: relative;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }

        .wishlist {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 20px;
            cursor: pointer;
        }

        .rating {
            color: orange;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        .qty {
            display: flex;
            justify-content: center;
            gap: 6px;
            align-items: center;
            margin-top: 8px;
        }

        .qty input {
            width: 45px;
            text-align: center;
        }

        /* Ensuring fixed header and elements */
        .products, .kategori, .search, .banner {
            margin-top: 180px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Medanshoping</div>
        <div class="menu">
            <div class="btn">❤️</div>
            <div class="btn">Keranjang (0)</div>
            <div class="btn" onclick="window.location.href='login.html'">Login</div>
        </div>
    </header>

    <div class="banner">
        🔥 Promo Medanshoping Diskon Sampai 70%!
    </div>

    <div class="search">
        <input type="text" placeholder="Cari produk..." id="search" onkeyup="cariProduk()">
    </div>

    <div class="kategori">
        <button>Semua</button>
        <button>Fashion</button>
        <button>Tas</button>
        <button>Sepatu</button>
    </div>

    <div class="products">
        <!-- Product Card 1 -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500" alt="Baju Fashion">
            <h3>Baju Fashion</h3>
            <div class="rating">⭐ 4.5</div>
            <div class="price">Rp 120.000</div>
            <div class="qty">
                <button>-</button>
                <input type="number" value="1">
                <button>+</button>
            </div>
            <button class="btn">Tambah Keranjang</button>
        </div>

        <!-- Product Card 2 -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500" alt="Tas Wanita">
            <h3>Tas Wanita</h3>
            <div class="rating">⭐ 4.6</div>
            <div class="price">Rp 150.000</div>
            <div class="qty">
                <button>-</button>
                <input type="number" value="1">
                <button>+</button>
            </div>
            <button class="btn">Tambah Keranjang</button>
        </div>

        <!-- Product Card 3 -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500" alt="Sepatu Trend">
            <h3>Sepatu Trend</h3>
            <div class="rating">⭐ 4.7</div>
            <div class="price">Rp 200.000</div>
            <div class="qty">
                <button>-</button>
                <input type="number" value="1">
                <button>+</button>
            </div>
            <button class="btn">Tambah Keranjang</button>
        </div>

        <!-- Product Card 4 -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1520975661595-6453be3f7070?w=500" alt="Jaket Pria">
            <h3>Jaket Pria</h3>
            <div class="rating">⭐ 4.8</div>
            <div class="price">Rp 250.000</div>
            <div class="qty">
                <button>-</button>
                <input type="number" value="1">
                <button>+</button>
            </div>
            <button class="btn">Tambah Keranjang</button>
        </div>
    </div>

    <script>
        function cariProduk() {
            var input = document.getElementById('search');
            var filter = input.value.toLowerCase();
            var productCards = document.querySelectorAll('.card');

            productCards.forEach(card => {
                var productName = card.querySelector('h3').textContent.toLowerCase();
                if (productName.includes(filter)) {
                    card.style.display = '';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>

</body>
</html>
