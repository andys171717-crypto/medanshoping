<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TembungShopping</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#2f4356;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.search{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}

.icon{
color:white;
font-size:22px;
position:relative;
cursor:pointer;
}

.badge{
position:absolute;
top:-5px;
right:-8px;
background:red;
color:white;
font-size:12px;
padding:2px 6px;
border-radius:10px;
}

.menu{
display:flex;
justify-content:space-around;
padding:15px;
background:white;
}

.menu div{
text-align:center;
font-size:14px;
}

.circle{
width:55px;
height:55px;
background:#3f556b;
border-radius:50%;
margin:auto;
margin-bottom:5px;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.info{
padding:10px;
}

.price{
color:#e53935;
font-weight:bold;
font-size:18px;
}

.btns{
display:flex;
gap:5px;
margin-top:10px;
}

.btn{
flex:1;
padding:8px;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.chat{
background:#3498db;
color:white;
}

.cart{
background:#27ae60;
color:white;
}

.cartPanel{
position:fixed;
right:-100%;
top:0;
width:80%;
height:100%;
background:white;
box-shadow:-2px 0 10px rgba(0,0,0,0.2);
transition:0.3s;
padding:15px;
overflow:auto;
}

.cartPanel.active{
right:0;
}

.cartItem{
border-bottom:1px solid #ddd;
padding:10px 0;
}

.remove{
background:red;
color:white;
border:none;
padding:4px 8px;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
text-align:center;
}

.popup button{
margin-top:10px;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #ddd;
}

</style>
</head>

<body>

<header>

<input class="search" placeholder="Cari produk di TembungShopping">

<div class="icon" onclick="openCart()">🛒
<span id="cartCount" class="badge">0</span>
</div>

<div class="icon">💬</div>

</header>

<div class="menu">

<div>
<div class="circle"></div>
Pulsa
</div>

<div>
<div class="circle"></div>
Promo
</div>

<div>
<div class="circle"></div>
Game
</div>

<div>
<div class="circle"></div>
Live
</div>

<div>
<div class="circle"></div>
Lainnya
</div>

</div>

<div class="products" id="productList"></div>

<div class="cartPanel" id="cartPanel">

<h2>Keranjang</h2>

<div id="cartItems"></div>

<h3>Total : Rp<span id="total">0</span></h3>

<button onclick="closeCart()">Tutup</button>

</div>

<div class="popup" id="popup">

<h2>🚀 Fitur Baru Segera Hadir</h2>

<p>Kami sedang menyiapkan fitur baru untuk meningkatkan pengalaman belanja kamu.</p>

<button onclick="closePopup()">Mengerti</button>

</div>

<div class="bottom">

<div>🏠<br>Beranda</div>
<div>📺<br>Live</div>
<div>🔔<br>Notifikasi</div>
<div>👤<br>Akun</div>

</div>

<script>

let products=[
{nama:"Sepatu Nike Sport",harga:100000,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
{nama:"Headphone Wireless",harga:200000,img:"https://images.unsplash.com/photo-1518443895914-6e9b3c8d8c5c"},
{nama:"Jam Tangan Sport",harga:150000,img:"https://images.unsplash.com/photo-1519741497674-611481863552"},
{nama:"Tas Ransel",harga:120000,img:"https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb"},
{nama:"Kacamata Hitam",harga:90000,img:"https://images.unsplash.com/photo-1511499767150-a48a237f0083"},
{nama:"Mouse Gaming",harga:80000,img:"https://images.unsplash.com/photo-1587202372775-e229f172b9d7"},
{nama:"Keyboard RGB",harga:250000,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
{nama:"Speaker Bluetooth",harga:175000,img:"https://images.unsplash.com/photo-1585386959984-a41552231658"}
];

let cart=[];

let productHTML="";

products.forEach((p,i)=>{

productHTML+=`
<div class="card">

<img src="${p.img}">

<div class="info">

<b>${p.nama}</b>

<div class="price">Rp${p.harga.toLocaleString()}</div>

<div class="btns">

<button class="btn chat" onclick="chat('${p.nama}')">💬</button>

<button class="btn cart" onclick="addCart(${i})">🛒</button>

</div>

</div>

</div>
`;

});

document.getElementById("productList").innerHTML=productHTML;

function chat(nama){

window.open("https://wa.me/?text=Saya tertarik dengan "+nama);

}

function addCart(i){

cart.push(products[i]);

updateCart();

}

function updateCart(){

let html="";
let total=0;

cart.forEach((p,index)=>{

total+=p.harga;

html+=`
<div class="cartItem">

<b>${p.nama}</b><br>
Rp${p.harga.toLocaleString()}<br>

<button class="remove" onclick="removeItem(${index})">Hapus</button>

</div>
`;

});

document.getElementById("cartItems").innerHTML=html;

document.getElementById("total").innerText=total.toLocaleString();

document.getElementById("cartCount").innerText=cart.length;

}

function removeItem(i){

cart.splice(i,1);

updateCart();

}

function openCart(){

document.getElementById("cartPanel").classList.add("active");

}

function closeCart(){

document.getElementById("cartPanel").classList.remove("active");

}

function closePopup(){

document.getElementById("popup").style.display="none";

}

</script>

</body>
</html>
