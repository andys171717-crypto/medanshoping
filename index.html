<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TembungShoping</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:system-ui;
background:#f5f5f5;
padding-top:65px;
padding-bottom:80px;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
background:linear-gradient(90deg,#ff6a00,#ff3d00);
display:flex;
align-items:center;
gap:8px;
padding:0 10px;
z-index:1000;
}

.search{
flex:1;
height:36px;
border:none;
border-radius:20px;
padding:0 12px;
}

.icon{
color:white;
font-size:20px;
position:relative;
}

.badge{
position:absolute;
top:-6px;
right:-8px;
background:red;
color:white;
font-size:10px;
padding:2px 6px;
border-radius:50%;
}

/* PRODUCTS */

.products{
padding:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.product{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:160px;
object-fit:cover;
}

.info{
padding:10px;
}

.title{
font-size:14px;
font-weight:bold;
height:35px;
overflow:hidden;
}

.price{
color:#e74c3c;
font-size:18px;
font-weight:bold;
}

.rating{
font-size:12px;
color:#f1c40f;
}

.sold{
font-size:11px;
color:#777;
}

.actions{
display:flex;
gap:6px;
padding:10px;
}

.btn{
flex:1;
border:none;
padding:8px;
border-radius:8px;
color:white;
}

.like{background:#e74c3c;}
.chat{background:#3498db;}
.cart{background:#27ae60;}

/* DETAIL PAGE */

.detail{
display:none;
padding:10px;
}

.detail img{
width:100%;
border-radius:10px;
}

.detail-title{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.detail-price{
font-size:22px;
color:#e74c3c;
font-weight:bold;
}

/* CART */

.cart-page{
display:none;
padding:10px;
}

.cart-item{
background:white;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

/* BOTTOM NAV */

.bottom{
position:fixed;
bottom:0;
width:100%;
height:70px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -3px 10px rgba(0,0,0,0.15);
font-size:13px;
}

.bottom i{
font-size:22px;
display:block;
margin-bottom:4px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<input class="search" id="search" placeholder="Cari produk...">

<div class="icon" onclick="openCart()">
<i class="fa-solid fa-cart-shopping"></i>
<span class="badge" id="cartcount">0</span>
</div>

</div>

<!-- HOME PRODUCTS -->

<div class="products" id="products"></div>

<!-- DETAIL PRODUK -->

<div class="detail" id="detail">

<button onclick="closeDetail()">⬅ Kembali</button>

<img id="dimg">

<div class="detail-title" id="dtitle"></div>

<div class="detail-price" id="dprice"></div>

<p>Produk berkualitas dengan harga terbaik di TembungShoping.</p>

<button onclick="addCart()" style="width:100%;padding:12px;background:#27ae60;color:white;border:none;border-radius:10px">
Tambah Keranjang
</button>

</div>

<!-- CART -->

<div class="cart-page" id="cartpage">

<h3>Keranjang Belanja</h3>

<div id="cartitems"></div>

</div>

<!-- BOTTOM -->

<div class="bottom">

<div onclick="home()">
<i class="fa-solid fa-house"></i>
Home
</div>

<div>
<i class="fa-solid fa-fire"></i>
Promo
</div>

<div onclick="openCart()">
<i class="fa-solid fa-cart-shopping"></i>
Cart
</div>

<div>
<i class="fa-solid fa-user"></i>
Akun
</div>

</div>

<script>

/* DATA PRODUK */

let products=[
{
name:"Sepatu Nike Sport",
price:"Rp100.000",
img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400"
},
{
name:"Headphone Wireless",
price:"Rp200.000",
img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400"
},
{
name:"Jam Tangan Smartwatch",
price:"Rp150.000",
img:"https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b?w=400"
},
{
name:"Tas Fashion Wanita",
price:"Rp250.000",
img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400"
}
];

let cart=[];
let selected=null;

/* LOAD PRODUK */

function loadProducts(){

let html="";

products.forEach((p,i)=>{

html+=`

<div class="product">

<img src="${p.img}" onclick="openDetail(${i})">

<div class="info">

<div class="title">${p.name}</div>

<div class="rating">⭐ ⭐ ⭐ ⭐ ☆</div>

<div class="sold">Terjual 100+</div>

<div class="price">${p.price}</div>

</div>

<div class="actions">

<button class="btn like"><i class="fa-solid fa-heart"></i></button>

<button class="btn chat"><i class="fa-solid fa-comment"></i></button>

<button class="btn cart" onclick="addCart(${i})">
<i class="fa-solid fa-cart-shopping"></i>
</button>

</div>

</div>

`;

});

document.getElementById("products").innerHTML=html;

}

loadProducts();

/* DETAIL */

function openDetail(i){

selected=i;

document.getElementById("products").style.display="none";
document.getElementById("detail").style.display="block";

let p=products[i];

dimg.src=p.img;
dtitle.innerText=p.name;
dprice.innerText=p.price;

}

function closeDetail(){

document.getElementById("products").style.display="grid";
document.getElementById("detail").style.display="none";

}

/* CART */

function addCart(i){

cart.push(products[i]);

cartcount.innerText=cart.length;

alert("Produk masuk keranjang");

}

function openCart(){

document.getElementById("products").style.display="none";
document.getElementById("detail").style.display="none";
document.getElementById("cartpage").style.display="block";

let html="";

cart.forEach(c=>{

html+=`
<div class="cart-item">
${c.name}<br>
<b>${c.price}</b>
</div>
`;

});

cartitems.innerHTML=html;

}

function home(){

document.getElementById("products").style.display="grid";
document.getElementById("detail").style.display="none";
document.getElementById("cartpage").style.display="none";

}

</script>

</body>
</html>
