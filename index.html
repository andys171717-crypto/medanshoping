<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medanshoping</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
        }

        header {
            background-color: orange;
            text-align: center;
            padding: 20px;
        }

        header img {
            width: 150px;
            height: auto;
        }

        header h1 {
            font-size: 24px;
            color: white;
            margin-top: 10px;
        }

        .promo-banner {
            background-color: yellow;
            text-align: center;
            padding: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        .search-bar {
            text-align: center;
            padding: 10px;
        }

        .search-bar input {
            width: 80%;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .categories {
            text-align: center;
            margin-top: 20px;
        }

        .categories button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 5px;
            border: none;
            background-color: orange;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .product-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            padding: 20px;
        }

        .product-card {
            background-color: white;
            padding: 20px;
            margin: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            width: 250px;
            text-align: center;
        }

        .product-card img {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }

        .product-card h3 {
            margin: 10px 0;
            font-size: 18px;
            font-weight: bold;
        }

        .product-card p {
            color: green;
            font-size: 16px;
        }

        .product-card button {
            padding: 10px;
            background-color: orange;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .product-card button:hover {
            background-color: darkorange;
        }
    </style>
</head>
<body>
    <header>
        <a href="https://ibb.co/n4cfgJK">
            <img src="https://i.ibb.co/01MZDbz/file-00000000f5f8720b88e2ab16d90baf2f.png" alt="Medanshoping Logo">
        </a>
        <h1>Medanshoping</h1>
    </header>

    <div class="promo-banner">
        🔥 Promo Medanshoping Diskon Sampai 70%! 🔥
    </div>

    <div class="search-bar">
        <input type="text" placeholder="Cari produk...">
    </div>

    <div class="categories">
        <button>Semua</button>
        <button>Fashion</button>
        <button>Tas</button>
        <button>Sepatu</button>
    </div>

    <div class="product-container">
        <div class="product-card">
            <img src="https://via.placeholder.com/200" alt="Baju Fashion">
            <h3>Baju Fashion</h3>
            <p>Rp 120.000</p>
            <p>⭐ 4.5</p>
            <button>Tambah Keranjang</button>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/200" alt="Tas Wanita">
            <h3>Tas Wanita</h3>
            <p>Rp 150.000</p>
            <p>⭐ 4.6</p>
            <button>Tambah Keranjang</button>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/200" alt="Sepatu Trend">
            <h3>Sepatu Trend</h3>
            <p>Rp 200.000</p>
            <p>⭐ 4.7</p>
            <button>Tambah Keranjang</button>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/200" alt="Jaket Pria">
            <h3>Jaket Pria</h3>
            <p>Rp 250.000</p>
            <p>⭐ 4.8</p>
            <button>Tambah Keranjang</button>
        </div>
    </div>
</body>
</html>
