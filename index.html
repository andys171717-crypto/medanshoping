<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medanshoping</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: orange;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            margin: 0;
        }
        header img {
            height: 40px;
        }
        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }
        .banner {
            background-color: yellow;
            text-align: center;
            padding: 10px;
        }
        .banner h2 {
            margin: 0;
        }
        .product-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .product-card {
            width: 200px;
            margin: 15px;
            padding: 10px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .product-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
        }
        .product-card h3 {
            margin: 10px 0;
        }
        .product-card p {
            font-size: 16px;
            color: #333;
        }
        .product-card button {
            background-color: orange;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
        }
        .product-card button:hover {
            background-color: #e07b00;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <img src="https://i.ibb.co/n4cfgJK/Medan-Shoping-Logo.png" alt="Medanshoping Logo">
        <h1>Medanshoping</h1>
        <nav>
            <a href="#">Dashboard</a>
            <a href="#">Keranjang (0)</a>
            <a href="#">Login</a>
        </nav>
    </header>

    <!-- Banner -->
    <section class="banner">
        <h2>🔥 Promo Medanshoping Diskon Sampai 70%!</h2>
    </section>

    <!-- Product Section -->
    <section class="product-container">
        <div class="product-card">
            <img src="https://i.imgur.com/QPfmPfx.jpg" alt="Baju Fashion">
            <h3>Baju Fashion</h3>
            <p>⭐ 4.5</p>
            <p>Rp 120.000</p>
            <button>Tambah Keranjang</button>
        </div>

        <div class="product-card">
            <img src="https://i.imgur.com/QPfmPfx.jpg" alt="Tas Wanita">
            <h3>Tas Wanita</h3>
            <p>⭐ 4.6</p>
            <p>Rp 150.000</p>
            <button>Tambah Keranjang</button>
        </div>

        <div class="product-card">
            <img src="https://i.imgur.com/QPfmPfx.jpg" alt="Sepatu Trend">
            <h3>Sepatu Trend</h3>
            <p>⭐ 4.7</p>
            <p>Rp 200.000</p>
            <button>Tambah Keranjang</button>
        </div>

        <div class="product-card">
            <img src="https://i.imgur.com/QPfmPfx.jpg" alt="Jaket Pria">
            <h3>Jaket Pria</h3>
            <p>⭐ 4.8</p>
            <p>Rp 250.000</p>
            <button>Tambah Keranjang</button>
        </div>
    </section>
</body>
</html>
