<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medanshoping</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            box-sizing: border-box;
        }

        /* Header Styles */
        header {
            background-color: #ff6600;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 10;
        }

        /* Logo Styling */
        .logo {
            font-weight: bold;
            font-size: 24px;
            color: white;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* Menu Styling */
        .menu {
            display: flex;
            gap: 15px;
        }

        .menu .btn {
            background-color: #ff6600;
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            border: 1px solid #ff6600;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .menu .btn:hover {
            background-color: #e55b00;
        }

        .menu .btn:active {
            background-color: #cc5200;
        }

        .menu .btn.active {
            background-color: #e55b00;
        }

        .menu .btn-secondary {
            background-color: transparent;
            border: 1px solid white;
            padding: 8px 16px;
            color: white;
        }

        .menu .btn-secondary:hover {
            background-color: white;
            color: #ff6600;
        }

        /* Dropdown style */
        .menu .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #ff6600;
            min-width: 160px;
            z-index: 1;
            padding: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown-content a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 8px;
        }

        .dropdown-content a:hover {
            background-color: #e55b00;
        }

        /* Product Grid Styles */
        .products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 90px;
            padding: 0 15px;
        }

        .card {
            background-color: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }

        .rating {
            color: orange;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        .qty {
            display: flex;
            justify-content: center;
            gap: 6px;
            align-items: center;
            margin-top: 8px;
        }

        .qty input {
            width: 45px;
            text-align: center;
        }

        /* Product Button */
        .btn {
            background-color: #ff6600;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>

<header>
    <!-- Logo -->
    <div class="logo">Medanshoping</div>

    <!-- Menu -->
    <div class="menu">
        <div class="btn active">Dashboard</div>
        <div class="btn">❤️</div>
        <div class="btn">Keranjang (0)</div>
        <div class="btn">Login</div>

        <!-- Dropdown for more options (e.g., settings, profile) -->
        <div class="dropdown">
            <button class="btn btn-secondary">Menu</button>
            <div class="dropdown-content">
                <a href="#">Profile</a>
                <a href="#">Order History</a>
                <a href="#">Logout</a>
            </div>
        </div>
    </div>
</header>

<!-- Product Grid -->
<div class="products" id="productList">
    <!-- Example Product Card -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500" alt="Baju Fashion">
        <h3>Baju Fashion</h3>
        <div class="rating">⭐ 4.5</div>
        <div class="price">Rp 120.000</div>
        <div class="qty">
            <button>-</button>
            <input type="number" value="1">
            <button>+</button>
        </div>
        <button class="btn">Tambah Keranjang</button>
    </div>

    <!-- More product cards here -->
</div>

<script>
    let produk = [
        {nama: "Baju Fashion", harga: 120000, rating: 4.5, gambar: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500"},
        {nama: "Tas Wanita", harga: 150000, rating: 4.6, gambar: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500"},
        {nama: "Sepatu Trend", harga: 200000, rating: 4.7, gambar: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500"},
        {nama: "Jaket Pria", harga: 250000, rating: 4.8, gambar: "https://images.unsplash.com/photo-1520975661595-6453be3f7070?w=500"}
    ];

    function tampilProduk(data) {
        let html = "";
        data.forEach((produk, index) => {
            html += `
                <div class="card">
                    <img src="${produk.gambar}" alt="${produk.nama}">
                    <h3>${produk.nama}</h3>
                    <div class="rating">⭐ ${produk.rating}</div>
                    <div class="price">Rp ${produk.harga.toLocaleString()}</div>
                    <div class="qty">
                        <button onclick="kurangProduk(${index})">-</button>
                        <input type="number" id="qty${index}" value="1" min="1">
                        <button onclick="tambahProduk(${index})">+</button>
                    </div>
                    <button class="btn" onclick="beliProduk(${index})">Tambah Keranjang</button>
                </div>
            `;
        });
        document.getElementById('productList').innerHTML = html;
    }

    function beliProduk(index) {
        let qty = parseInt(document.getElementById(`qty${index}`).value);
        alert(`Produk ${produk[index].nama} dengan jumlah ${qty} berhasil ditambahkan ke keranjang.`);
    }

    tampilProduk(produk);  // Initial product display
</script>

</body>
</html>
