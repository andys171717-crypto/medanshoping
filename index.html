<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TembungShopping</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* HEADER */

header{
background:#3b5168;
padding:10px;
display:flex;
align-items:center;
gap:10px;
color:white;
}

.search{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}

.icon{
position:relative;
font-size:22px;
cursor:pointer;
}

.badge{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
font-size:12px;
border-radius:50%;
padding:2px 6px;
}

/* KATEGORI */

.category{
display:flex;
justify-content:space-around;
padding:15px 0;
background:white;
}

.cat{
text-align:center;
font-size:14px;
}

.circle{
width:50px;
height:50px;
background:#3b5168;
border-radius:50%;
margin:auto;
}

/* PRODUK */

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.info{
padding:10px;
}

.price{
color:#e74c3c;
font-weight:bold;
}

.btn{
background:#27ae60;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:6px;
margin-top:8px;
cursor:pointer;
}

/* BOTTOM NAV */

.bottom{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px 0;
border-top:1px solid #ddd;
}

.nav{
text-align:center;
font-size:14px;
cursor:pointer;
}

/* MODAL */

.modal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:10px;
width:80%;
max-width:350px;
display:none;
z-index:1000;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
}

.close{
background:#e74c3c;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:6px;
margin-bottom:10px;
cursor:pointer;
}

.checkout{
background:#27ae60;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

</style>
</head>

<body>

<header>

<input id="search" class="search" placeholder="Cari produk">

<div class="icon" onclick="openCart()">
🛒
<span id="cartCount" class="badge">0</span>
</div>

<div class="icon" onclick="openNotif()">
🔔
<span id="notifCount" class="badge">2</span>
</div>

<div class="icon" onclick="openChat()">💬</div>

</header>

<div class="category">
<div class="cat"><div class="circle"></div>Pulsa</div>
<div class="cat"><div class="circle"></div>Promo</div>
<div class="cat"><div class="circle"></div>Game</div>
<div class="cat"><div class="circle"></div>Live</div>
<div class="cat"><div class="circle"></div>Lainnya</div>
</div>

<div class="products" id="products"></div>

<!-- CART -->

<div class="overlay" id="overlay"></div>

<div class="modal" id="cartModal">

<button class="close" onclick="closeModal()">Tutup</button>

<h2>Keranjang</h2>

<div id="cartItems"></div>

<h3 id="total"></h3>

<button class="checkout">Checkout</button>

</div>

<!-- NOTIF -->

<div class="modal" id="notifModal">

<h2>Notifikasi</h2>

<p id="notifText">Pesan baru tersedia</p>

<button class="btn" onclick="readNotif()">Oke</button>

</div>

<!-- BOTTOM NAV -->

<div class="bottom">

<div class="nav" onclick="goHome()">🏠<br>Beranda</div>

<div class="nav" onclick="openCart()">🛒<br>Keranjang</div>

<div class="nav" onclick="openChat()">💬<br>Chat</div>

<div class="nav" onclick="openAccount()">👤<br>Akun</div>

</div>

<script>

let products=[
{nama:"Sepatu Sport",harga:100000,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
{nama:"Headphone Gaming",harga:200000,img:"https://images.unsplash.com/photo-1518444065439-e933c06ce9cd"},
{nama:"Jam Tangan",harga:150000,img:"https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b"},
{nama:"Tas Fashion",harga:180000,img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"},
{nama:"Laptop Gaming",harga:8500000,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
{nama:"Mouse Gaming",harga:120000,img:"https://images.unsplash.com/photo-1587202372775-e229f172b9d7"}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let notif=JSON.parse(localStorage.getItem("notif"))||["Pesan"];

function saveData(){
localStorage.setItem("cart",JSON.stringify(cart));
localStorage.setItem("notif",JSON.stringify(notif));
}

function renderProducts(){

let container=document.getElementById("products");
container.innerHTML="";

products.forEach((p,i)=>{

container.innerHTML+=`
<div class="card">

<img src="${p.img}">

<div class="info">

<h3>${p.nama}</h3>

<div class="price">Rp${p.harga.toLocaleString()}</div>

<button class="btn" onclick="addCart(${i})">Tambah Keranjang</button>

</div>

</div>
`;

});

}

function addCart(i){

cart.push(products[i]);

saveData();

updateCart();

}

function updateCart(){

document.getElementById("cartCount").innerText=cart.length;

}

function openCart(){

let modal=document.getElementById("cartModal");
let overlay=document.getElementById("overlay");

modal.style.display="block";
overlay.style.display="block";

let items="";
let total=0;

cart.forEach(p=>{

items+=`${p.nama} - Rp${p.harga.toLocaleString()}<br>`;
total+=p.harga;

});

document.getElementById("cartItems").innerHTML=items||"Keranjang kosong";

document.getElementById("total").innerText="Total: Rp"+total.toLocaleString();

}

function openNotif(){

let modal=document.getElementById("notifModal");
let overlay=document.getElementById("overlay");

modal.style.display="block";
overlay.style.display="block";

}

function readNotif(){

notif=[];

saveData();

document.getElementById("notifCount").innerText="0";

closeModal();

}

function closeModal(){

document.querySelectorAll(".modal").forEach(m=>m.style.display="none");

document.getElementById("overlay").style.display="none";

}

function openChat(){

alert("Fitur chat belum tersedia");

}

function openAccount(){

alert("Fitur akun belum tersedia");

}

function goHome(){

document.getElementById("search").value="";

window.scrollTo(0,0);

}

function updateNotif(){

document.getElementById("notifCount").innerText=notif.length;

}

renderProducts();
updateCart();
updateNotif();

</script>

</body>
</html>
