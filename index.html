<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedanShopping</title>
    <style>
        /* CSS untuk Logo */
        header .logo a {
            font-size: 36px; /* Ukuran font lebih besar untuk menarik perhatian */
            font-weight: bold; /* Menambah ketebalan font */
            color: #ffffff; /* Mengubah warna teks menjadi putih */
            text-decoration: none; /* Menghilangkan underline */
            letter-spacing: 2px; /* Memberikan sedikit spasi antar huruf */
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3); /* Menambahkan bayangan halus untuk kontras lebih baik */
        }

        /* Efek Hover untuk Logo */
        header .logo a:hover {
            color: #ffcc00; /* Ubah warna menjadi kuning saat hover */
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5); /* Pertegas bayangan saat hover */
        }

        /* Styling untuk Pencarian dan Ikon Keranjang */
        .search-cart-icons input {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            width: 60%;
        }

        .search-cart-icons a {
            margin-left: 15px;
            font-size: 18px;
            color: #ffffff;
            text-decoration: none;
        }

        .search-cart-icons a:hover {
            color: #ffcc00; /* Ubah warna ikon menjadi kuning saat hover */
        }

        /* Styling untuk Konten dan Footer */
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        footer {
            background-color: #333;
            color: #ffffff;
            text-align: center;
            padding: 15px 0;
        }

        footer a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 10px;
        }

        footer a:hover {
            color: #ffcc00;
        }
    </style>
</head>
<body>
    <header style="background-color: #ff6600; padding: 10px 20px;">
        <div class="logo">
            <a href="#">MedanShopping</a>
        </div>
        <div class="search-cart-icons" style="display: flex; align-items: center;">
            <input type="text" placeholder="Cari produk...">
            <a href="#" class="cart-icon"><img src="cart-icon.png" alt="Keranjang"></a>
            <a href="#" class="heart-icon"><img src="heart-icon.png" alt="Favorit"></a>
            <a href="#" class="menu-icon"><img src="menu-icon.png" alt="Menu"></a>
        </div>
    </header>

    <section style="padding: 20px; background-color: #ffffff;">
        <div style="text-align: center;">
            <h1>Selamat datang di MedanShopping</h1>
            <p>Dapatkan produk terbaik dengan harga terjangkau.</p>
            <button style="padding: 10px 20px; background-color: #ffcc00; border: none; font-size: 16px; cursor: pointer;">Belanja Sekarang</button>
        </div>

        <div style="display: flex; justify-content: space-around; margin-top: 20px;">
            <div>
                <img src="elektronik-icon.png" alt="Elektronik" style="width: 50px;">
                <p>Elektronik</p>
            </div>
            <div>
                <img src="pakaian-icon.png" alt="Pakaian" style="width: 50px;">
                <p>Pakaian</p>
            </div>
            <div>
                <img src="perabot-icon.png" alt="Perabot" style="width: 50px;">
                <p>Perabot</p>
            </div>
            <div>
                <img src="gadget-icon.png" alt="Gadget" style="width: 50px;">
                <p>Gadget</p>
            </div>
        </div>

        <div>
            <h2>Produk Unggulan</h2>
            <div style="display: flex; justify-content: space-around; margin-top: 20px;">
                <div style="width: 200px; text-align: center; border: 1px solid #ccc; padding: 10px;">
                    <img src="product1.jpg" alt="Produk 1" style="width: 100%;">
                    <h3>Produk 1</h3>
                    <p>Rp 100,000</p>
                    <button style="padding: 10px 20px; background-color: #ff6600; border: none; font-size: 14px; cursor: pointer;">Tambahkan ke Keranjang</button>
                </div>
                <div style="width: 200px; text-align: center; border: 1px solid #ccc; padding: 10px;">
                    <img src="product2.jpg" alt="Produk 2" style="width: 100%;">
                    <h3>Produk 2</h3>
                    <p>Rp 200,000</p>
                    <button style="padding: 10px 20px; background-color: #ff6600; border: none; font-size: 14px; cursor: pointer;">Tambahkan ke Keranjang</button>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <a href="#">Privacy Policy</a>
        <a href="#">Terms & Conditions</a>
    </footer>
</body>
</html>
