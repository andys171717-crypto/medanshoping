<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TembungShoping</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */

.header{
background:#2c3e50;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.search{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}

.icon{
font-size:22px;
color:white;
position:relative;
cursor:pointer;
}

.badge{
position:absolute;
top:-5px;
right:-8px;
background:red;
color:white;
font-size:12px;
padding:2px 6px;
border-radius:50%;
}

/* PRODUK */

.container{
padding:10px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card h3{
margin:10px;
}

.price{
color:#e74c3c;
margin:0 10px 10px;
font-weight:bold;
}

.btn{
background:#27ae60;
color:white;
border:none;
padding:10px;
margin:10px;
border-radius:6px;
width:calc(100% - 20px);
cursor:pointer;
}

/* FOOTER */

.footer{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:8px 0;
border-top:1px solid #ddd;
}

.menu{
text-align:center;
font-size:14px;
cursor:pointer;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
padding:20px;
border-radius:10px;
width:80%;
max-width:300px;
text-align:center;
}

.popup-box button{
margin-top:15px;
padding:8px 15px;
border:none;
background:#3498db;
color:white;
border-radius:6px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<input class="search" id="search" placeholder="Cari produk">

<div class="icon" onclick="openCart()">
🛒
<span class="badge" id="cartCount">0</span>
</div>

<div class="icon" onclick="showNotif()">
🔔
<span class="badge" id="notifCount">0</span>
</div>

<div class="icon" onclick="showPopup('Fitur chat belum tersedia')">
💬
</div>

</div>


<!-- PRODUK -->

<div class="container" id="productList">

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h3>Sepatu Sport</h3>
<div class="price">Rp100.000</div>
<button class="btn" onclick="addCart('Sepatu Sport')">Tambah Keranjang</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1518441902117-1a7d9b6c1b4f">
<h3>Headphone Gaming</h3>
<div class="price">Rp200.000</div>
<button class="btn" onclick="addCart('Headphone Gaming')">Tambah Keranjang</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b">
<h3>Jam Tangan</h3>
<div class="price">Rp150.000</div>
<button class="btn" onclick="addCart('Jam Tangan')">Tambah Keranjang</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3">
<h3>Tas Fashion</h3>
<div class="price">Rp180.000</div>
<button class="btn" onclick="addCart('Tas Fashion')">Tambah Keranjang</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<h3>Laptop Gaming</h3>
<div class="price">Rp8.500.000</div>
<button class="btn" onclick="addCart('Laptop Gaming')">Tambah Keranjang</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1587829741301-dc798b83add3">
<h3>Mouse Gaming</h3>
<div class="price">Rp120.000</div>
<button class="btn" onclick="addCart('Mouse Gaming')">Tambah Keranjang</button>
</div>

</div>


<!-- FOOTER -->

<div class="footer">

<div class="menu" onclick="goHome()">
🏠
<br>
Beranda
</div>

<div class="menu" onclick="openCart()">
🛒
<br>
Keranjang
</div>

<div class="menu" onclick="showNotif()">
🔔
<br>
Notif
</div>

<div class="menu" onclick="showPopup('Fitur akun belum tersedia')">
👤
<br>
Akun
</div>

</div>


<!-- POPUP -->

<div class="popup" id="popup">
<div class="popup-box">
<div id="popupText"></div>
<button onclick="closePopup()">OK</button>
</div>
</div>


<script>

/* LOAD STORAGE */

let cart = localStorage.getItem("cart")
cart = cart ? parseInt(cart) : 0

let notif = localStorage.getItem("notif")
notif = notif ? parseInt(notif) : 0

updateUI()


/* UPDATE UI */

function updateUI(){

document.getElementById("cartCount").innerText = cart
document.getElementById("notifCount").innerText = notif

}


/* TAMBAH KERANJANG */

function addCart(nama){

cart++

notif++

localStorage.setItem("cart",cart)
localStorage.setItem("notif",notif)

updateUI()

showPopup(nama + " berhasil ditambahkan ke keranjang")

}


/* BUKA KERANJANG */

function openCart(){

showPopup("Jumlah barang di keranjang : " + cart)

}


/* NOTIF */

function showNotif(){

showPopup("Kamu memiliki " + notif + " notifikasi")

}


/* BERANDA */

function goHome(){

document.getElementById("search").value=""

let produk = document.querySelectorAll(".card")

produk.forEach(p=>{
p.style.display="block"
})

window.scrollTo(0,0)

}


/* SEARCH */

document.getElementById("search").addEventListener("keyup",function(){

let value = this.value.toLowerCase()

let produk = document.querySelectorAll(".card")

produk.forEach(p=>{

let nama = p.innerText.toLowerCase()

if(nama.includes(value)){
p.style.display="block"
}else{
p.style.display="none"
}

})

})


/* POPUP */

function showPopup(text){

document.getElementById("popupText").innerText=text

document.getElementById("popup").style.display="flex"

}

function closePopup(){

document.getElementById("popup").style.display="none"

}

</script>

</body>
</html>
