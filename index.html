<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TembungShoping</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
padding-top:75px;
padding-bottom:80px;
}

.header{
background:#2c3e50;
padding:12px;
display:flex;
align-items:center;
gap:12px;
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
box-sizing:border-box;
}

.search{
flex:1;
height:42px;
padding:0 16px;
border-radius:25px;
border:none;
outline:none;
font-size:14px;
}

.icon{
font-size:24px;
color:white;
cursor:pointer;
position:relative;
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
}

.cart-count{
position:absolute;
top:-4px;
right:-6px;
background:red;
color:white;
font-size:11px;
padding:2px 6px;
border-radius:50%;
}

.menu{
display:grid;
grid-template-columns:repeat(5,1fr);
background:white;
padding:10px;
text-align:center;
font-size:14px;
}

.circle{
width:45px;
height:45px;
background:#3b4f63;
border-radius:50%;
margin:auto;
margin-bottom:5px;
}

.products{
padding:12px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.product{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
position:relative;
}

.product img{
width:100%;
height:170px;
object-fit:cover;
cursor:pointer;
}

.info{
padding:10px;
}

.info b{
font-size:16px;
display:block;
margin-bottom:4px;
line-height:1.3;
height:38px;
overflow:hidden;
}

.rating{color:#ffb400;font-size:14px;}
.sold{font-size:12px;color:#777;}
.free{font-size:11px;color:#27ae60;font-weight:bold;margin:4px 0;}

.price{
color:#e74c3c;
font-size:20px;
font-weight:bold;
margin:6px 0;
}

button{
border:none;
background:#27ae60;
color:white;
border-radius:10px;
padding:10px;
cursor:pointer;
width:100%;
}

.qty-control{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
padding:10px;
}

.qty-control button{
width:35px;
height:35px;
padding:0;
font-size:18px;
}

.qty-input{
width:40px;
text-align:center;
border:none;
background:#eee;
border-radius:6px;
height:32px;
}

.cart-popup{
position:fixed;
top:0;
right:-100%;
width:80%;
height:100%;
background:white;
padding:20px;
overflow:auto;
z-index:1000;
}

.cart-popup.active{
right:0;
}

.cart-item{
border-bottom:1px solid #eee;
padding:10px 0;
}

.cart-qty{
display:flex;
gap:8px;
align-items:center;
margin-top:6px;
}

.cart-qty button{
width:30px;
height:30px;
padding:0;
}

.remove-btn{
background:#e74c3c;
margin-top:6px;
}

.close-cart{
background:#e74c3c;
margin-bottom:10px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
height:65px;
box-shadow:0 -3px 12px rgba(0,0,0,0.08);
}

.bottom div{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
cursor:pointer;
}

.icon-bottom{font-size:22px;}

/* popup fitur */

.cool-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:.3s;
z-index:2000;
}

.cool-popup.show{
opacity:1;
pointer-events:auto;
}

.popup-box{
background:white;
padding:25px;
border-radius:20px;
width:80%;
max-width:320px;
text-align:center;
}

/* detail produk */

.detail-popup{
position:fixed;
bottom:-100%;
left:0;
width:100%;
background:white;
border-radius:20px 20px 0 0;
padding:20px;
transition:.3s;
z-index:3000;
}

.detail-popup.show{
bottom:0;
}

.detail-popup img{
width:100%;
border-radius:10px;
}

</style>
</head>

<body>

<div class="header">

<input class="search" id="search" placeholder="Cari produk di TembungShoping">

<div class="icon" onclick="toggleCart()">🛒
<span id="cartcount" class="cart-count">0</span>
</div>

<div class="icon" onclick="chatAdmin()">💬</div>

</div>

<div class="menu">
<div onclick="devAlert()"><div class="circle"></div>Pulsa</div>
<div onclick="devAlert()"><div class="circle"></div>Promo</div>
<div onclick="devAlert()"><div class="circle"></div>Game</div>
<div onclick="devAlert()"><div class="circle"></div>Live</div>
<div onclick="devAlert()"><div class="circle"></div>Lainnya</div>
</div>

<div class="products" id="products"></div>

<div class="cart-popup" id="cartpopup">

<button class="close-cart" onclick="toggleCart()">Tutup</button>
<h2>Keranjang</h2>

<div id="cartitems"></div>

</div>

<div class="bottom">
<div onclick="menuHome()"><span class="icon-bottom">🏠</span>Beranda</div>
<div onclick="devAlert()"><span class="icon-bottom">📺</span>Live</div>
<div onclick="devAlert()"><span class="icon-bottom">🔔</span>Notifikasi</div>
<div onclick="devAlert()"><span class="icon-bottom">👤</span>Akun</div>
</div>

<!-- popup fitur -->

<div id="coolPopup" class="cool-popup">
<div class="popup-box">
<h2>🚀 Fitur Baru Segera Hadir</h2>
<p>Kami sedang menyiapkan fitur baru agar pengalaman belanja kamu lebih mudah dan menyenangkan.</p>
<button onclick="closePopup()">Mengerti</button>
</div>
</div>

<!-- popup detail produk -->

<div id="detailPopup" class="detail-popup">

<img id="detailImg">

<h2 id="detailNama"></h2>

<p id="detailSold"></p>

<h3 id="detailHarga"></h3>

<div class="qty-control">
<button onclick="detailMinus()">-</button>
<input id="detailQty" class="qty-input" value="1">
<button onclick="detailPlus()">+</button>
</div>

<button onclick="addDetailCart()">Tambah ke Keranjang</button>

<br><br>

<button onclick="closeDetail()">Tutup</button>

</div>

<script>

const produk=[
{nama:"Sepatu Nike Sport",harga:100000,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400",sold:"1.2k"},
{nama:"Headphone Wireless",harga:200000,img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400",sold:"950"},
{nama:"Jam Tangan Smartwatch",harga:150000,img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400",sold:"870"},
{nama:"Tas Fashion Wanita",harga:180000,img:"https://images.unsplash.com/photo-1591561954557-26941169b49e?w=400",sold:"640"},
{nama:"Kacamata Fashion",harga:90000,img:"https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=400",sold:"520"},
{nama:"Parfum Coco Chanel",harga:120000,img:"https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=400",sold:"430"},
{nama:"Smartphone Premium",harga:80000,img:"https://images.unsplash.com/photo-1580910051074-3eb694886505?w=400",sold:"390"},
{nama:"PC Gaming RGB",harga:70000,img:"https://images.unsplash.com/photo-1587202372775-e229f172b9d7?w=400",sold:"210"}
]

let cart=JSON.parse(localStorage.getItem("cart"))||[]
let selectedProduk=null

function rupiah(x){
return Number(x).toLocaleString("id-ID")
}

function tampilProduk(list=produk){

let html=""

list.forEach((p,i)=>{

html+=`
<div class="product">

<img src="${p.img}" onclick="showDetail(${i})">

<div class="info">
<b>${p.nama}</b>
<div class="rating">⭐⭐⭐⭐☆</div>
<div class="sold">Terjual ${p.sold}</div>
<div class="free">Gratis Ongkir</div>
<div class="price">Rp${rupiah(p.harga)}</div>
</div>

<div class="qty-control">
<button onclick="minusQty(${i})">-</button>
<input class="qty-input" id="qty${i}" value="0">
<button onclick="plusQty(${i})">+</button>
</div>

</div>
`
})

document.getElementById("products").innerHTML=html
syncQty()

}

function syncQty(){

produk.forEach((p,i)=>{

let qty=cart.filter(c=>c.nama==p.nama).length
let el=document.getElementById("qty"+i)

if(el) el.value=qty

})

}

function renderCart(){

let data={}
cart.forEach(item=>{
if(!data[item.nama]){
data[item.nama]={harga:item.harga,qty:0}
}
data[item.nama].qty++
})

let html=""
let total=0

for(let nama in data){

let item=data[nama]
let subtotal=item.harga*item.qty
total+=subtotal

html+=`
<div class="cart-item">

<b>${nama}</b>

<div class="cart-qty">

<button onclick="cartMinus('${nama}')">-</button>

<span>${item.qty}</span>

<button onclick="cartPlus('${nama}',${item.harga})">+</button>

</div>

<div>Subtotal : Rp${rupiah(subtotal)}</div>

<button class="remove-btn" onclick="removeItem('${nama}')">Hapus</button>

</div>
`

}

html+=`
<h3>Total : Rp${rupiah(total)}</h3>
<button onclick="checkoutWA()">Checkout WhatsApp</button>
`

document.getElementById("cartitems").innerHTML=html
document.getElementById("cartcount").innerText=cart.length
localStorage.setItem("cart",JSON.stringify(cart))

}

function plusQty(i){
cart.push(produk[i])
renderCart()
syncQty()
}

function minusQty(i){

let index=cart.findIndex(c=>c.nama==produk[i].nama)

if(index>-1){
cart.splice(index,1)
renderCart()
syncQty()
}

}

function cartPlus(nama,harga){
cart.push({nama,harga})
renderCart()
syncQty()
}

function cartMinus(nama){

let index=cart.findIndex(c=>c.nama==nama)

if(index>-1){
cart.splice(index,1)
}

renderCart()
syncQty()

}

function removeItem(nama){

cart=cart.filter(c=>c.nama!=nama)

renderCart()
syncQty()

}

function toggleCart(){
document.getElementById("cartpopup").classList.toggle("active")
}

function checkoutWA(){

let text="Pesanan:%0A"

cart.forEach(i=>{
text+=i.nama+"%0A"
})

window.open("https://wa.me/6281220549530?text="+text)

}

function chatAdmin(){
window.open("https://wa.me/6281220549530")
}

function devAlert(){
document.getElementById("coolPopup").classList.add("show")
}

function closePopup(){
document.getElementById("coolPopup").classList.remove("show")
}

function menuHome(){
document.getElementById("search").value=""
tampilProduk()
window.scrollTo(0,0)
}

document.getElementById("search").addEventListener("keyup",function(){

let key=this.value.toLowerCase()
let hasil=produk.filter(p=>p.nama.toLowerCase().includes(key))
tampilProduk(hasil)

})

function showDetail(i){

selectedProduk=produk[i]

document.getElementById("detailImg").src=selectedProduk.img
document.getElementById("detailNama").innerText=selectedProduk.nama
document.getElementById("detailSold").innerText="Terjual "+selectedProduk.sold
document.getElementById("detailHarga").innerText="Rp"+rupiah(selectedProduk.harga)

document.getElementById("detailQty").value=1

document.getElementById("detailPopup").classList.add("show")

}

function closeDetail(){
document.getElementById("detailPopup").classList.remove("show")
}

function detailPlus(){
document.getElementById("detailQty").value++
}

function detailMinus(){

let q=document.getElementById("detailQty")

if(q.value>1){
q.value--
}

}

function addDetailCart(){

let qty=parseInt(document.getElementById("detailQty").value)

for(let i=0;i<qty;i++){
cart.push(selectedProduk)
}

renderCart()
syncQty()
closeDetail()

}

tampilProduk()
renderCart()

</script>

</body>
</html>
