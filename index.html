<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TembungShoping</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
padding-top:75px;
padding-bottom:80px;
}

/* HEADER */

.header{
background:#2c3e50;
padding:12px;
display:flex;
align-items:center;
gap:12px;
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
box-sizing:border-box;
}

.search{
flex:1;
height:42px;
padding:0 16px;
border-radius:25px;
border:none;
outline:none;
font-size:14px;
}

.icon{
font-size:24px;
color:white;
cursor:pointer;
position:relative;
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
}

.cart-count{
position:absolute;
top:-4px;
right:-6px;
background:red;
color:white;
font-size:11px;
padding:2px 6px;
border-radius:50%;
}

/* MENU */

.menu{
display:grid;
grid-template-columns:repeat(5,1fr);
background:white;
padding:10px;
text-align:center;
font-size:14px;
}

.circle{
width:45px;
height:45px;
background:#3b4f63;
border-radius:50%;
margin:auto;
margin-bottom:5px;
}

/* PRODUK */

.products{
padding:12px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.product{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
position:relative;
}

.product img{
width:100%;
height:170px;
object-fit:cover;
cursor:pointer;
}

.badge{
position:absolute;
top:8px;
left:8px;
background:#ff3b30;
color:white;
font-size:11px;
padding:3px 6px;
border-radius:6px;
}

.wishlist{
position:absolute;
top:8px;
right:8px;
background:white;
border-radius:50%;
padding:6px;
font-size:14px;
}

.info{
padding:10px;
}

.info b{
font-size:16px;
display:block;
margin-bottom:4px;
line-height:1.3;
cursor:pointer;
}

.rating{
color:#ffb400;
font-size:14px;
}

.sold{
font-size:12px;
color:#777;
}

.free{
font-size:11px;
color:#27ae60;
font-weight:bold;
margin:4px 0;
}

.price{
color:#e74c3c;
font-size:20px;
font-weight:bold;
margin:6px 0;
}

button{
border:none;
background:#27ae60;
color:white;
border-radius:10px;
padding:10px;
cursor:pointer;
width:100%;
}

/* CART */

.cart-popup{
position:fixed;
top:0;
right:-100%;
width:80%;
height:100%;
background:white;
padding:20px;
transition:0.3s;
overflow:auto;
z-index:1000;
}

.cart-popup.active{
right:0;
}

.close-cart{
background:#e74c3c;
margin-bottom:10px;
}

/* NOTIF */

.notif-item{
padding:10px;
border-bottom:1px solid #eee;
}

/* MENU BAWAH */

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
height:65px;
box-shadow:0 -3px 12px rgba(0,0,0,0.08);
z-index:999;
}

.bottom div{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
cursor:pointer;
position:relative;
}

.bottom span{
font-size:22px;
}

/* POPUP */

.cool-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:0.3s;
z-index:2000;
}

.cool-popup.show{
opacity:1;
pointer-events:auto;
}

.popup-box{
background:white;
padding:25px;
border-radius:20px;
width:80%;
max-width:320px;
text-align:center;
}

/* DETAIL PRODUK */

.product-detail{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:3000;
overflow:auto;
display:none;
}

.product-detail.show{
display:block;
}

.detail-box{
padding:20px;
}

.detail-box img{
width:100%;
border-radius:10px;
margin-bottom:15px;
}

.close-detail{
background:#2c3e50;
margin-bottom:15px;
}

</style>
</head>

<body>

<div class="header">

<input class="search" id="search" placeholder="Cari produk di TembungShoping">

<div class="icon" onclick="toggleCart()">🛒
<span id="cartcount" class="cart-count">0</span>
</div>

<div class="icon" onclick="chatAdmin()">💬</div>

</div>

<div class="menu">

<div onclick="devAlert()"><div class="circle"></div>Pulsa</div>
<div onclick="devAlert()"><div class="circle"></div>Promo</div>
<div onclick="devAlert()"><div class="circle"></div>Game</div>
<div onclick="devAlert()"><div class="circle"></div>Live</div>
<div onclick="devAlert()"><div class="circle"></div>Lainnya</div>

</div>

<div class="products" id="products"></div>

<!-- CART -->

<div class="cart-popup" id="cartpopup">
<button class="close-cart" onclick="toggleCart()">Tutup</button>
<h2>Keranjang</h2>
<div id="cartitems"></div>
</div>

<!-- NOTIF -->

<div class="cart-popup" id="notifpopup">
<button class="close-cart" onclick="toggleNotif()">Tutup</button>
<h2>Notifikasi</h2>
<div id="notifitems"></div>
</div>

<!-- DETAIL -->

<div id="productDetail" class="product-detail">

<div class="detail-box">

<button class="close-detail" onclick="closeDetail()">← Kembali</button>

<img id="detailImg">

<h2 id="detailName"></h2>

<div class="rating">⭐⭐⭐⭐☆</div>

<div id="detailSold"></div>

<h2 id="detailPrice"></h2>

<p>
Produk berkualitas tinggi dengan desain modern dan bahan premium.
</p>

<button onclick="addcart(detailNama,detailHarga)">
Masukkan Keranjang
</button>

</div>

</div>

<!-- MENU BAWAH -->

<div class="bottom">

<div onclick="menuHome()">
<span>🏠</span>
Beranda
</div>

<div onclick="devAlert()">
<span>📺</span>
Live
</div>

<div onclick="toggleNotif()">
<span>🔔</span>
Notifikasi
<span id="notifcount" class="cart-count">0</span>
</div>

<div onclick="devAlert()">
<span>👤</span>
Akun
</div>

</div>

<div id="coolPopup" class="cool-popup">

<div class="popup-box">

<h2>🚀 Fitur Segera Hadir</h2>

<p>Fitur ini sedang dikembangkan.</p>

<button onclick="closePopup()">Mengerti</button>

</div>

</div>

<script>

const produk=[
{nama:"Sepatu Nike Sport",harga:100000,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400",sold:"1.2k"},
{nama:"Headphone Wireless",harga:200000,img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400",sold:"950"},
{nama:"Jam Tangan Smartwatch",harga:150000,img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400",sold:"870"},
{nama:"Tas Fashion Wanita",harga:180000,img:"https://images.unsplash.com/photo-1591561954557-26941169b49e?w=400",sold:"640"},
{nama:"Kacamata Fashion",harga:90000,img:"https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=400",sold:"520"},
{nama:"Parfum Coco Chanel",harga:120000,img:"https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=400",sold:"430"},
{nama:"Smartphone Premium",harga:80000,img:"https://images.unsplash.com/photo-1580910051074-3eb694886505?w=400",sold:"390"},
{nama:"PC Gaming RGB",harga:70000,img:"https://images.unsplash.com/photo-1587202372775-e229f172b9d7?w=400",sold:"210"}
]

let cart=[]
let notif=[]
let detailNama=""
let detailHarga=0

function rupiah(x){
return Number(x).toLocaleString("id-ID")
}

function tampilProduk(){

let html=""

produk.forEach(p=>{

html+=`
<div class="product">

<div class="badge">-30%</div>
<div class="wishlist">❤️</div>

<img src="${p.img}" onclick="showDetail('${p.nama}',${p.harga},'${p.img}','${p.sold}')">

<div class="info">

<b onclick="showDetail('${p.nama}',${p.harga},'${p.img}','${p.sold}')">${p.nama}</b>

<div class="rating">⭐⭐⭐⭐☆</div>

<div class="sold">Terjual ${p.sold}</div>

<div class="free">Gratis Ongkir</div>

<div class="price">Rp${rupiah(p.harga)}</div>

<button onclick="addcart('${p.nama}',${p.harga})">
Tambah Keranjang
</button>

</div>

</div>
`
})

document.getElementById("products").innerHTML=html
}

function showDetail(nama,harga,img,sold){
detailNama=nama
detailHarga=harga
document.getElementById("detailImg").src=img
document.getElementById("detailName").innerText=nama
document.getElementById("detailPrice").innerText="Rp"+rupiah(harga)
document.getElementById("detailSold").innerText="Terjual "+sold
document.getElementById("productDetail").classList.add("show")
}

function closeDetail(){
document.getElementById("productDetail").classList.remove("show")
}

function addcart(nama,harga){
cart.push({nama,harga})
document.getElementById("cartcount").innerText=cart.length
notif.unshift({text:nama+" ditambahkan ke keranjang"})
updateNotif()
}

function toggleCart(){
document.getElementById("cartpopup").classList.toggle("active")
}

function toggleNotif(){
document.getElementById("notifpopup").classList.toggle("active")
}

function updateNotif(){
let html=""
notif.forEach(n=>{
html+=`<div class="notif-item">${n.text}</div>`
})
document.getElementById("notifitems").innerHTML=html
document.getElementById("notifcount").innerText=notif.length
}

function chatAdmin(){
window.open("https://wa.me/6281220549530")
}

function devAlert(){
document.getElementById("coolPopup").classList.add("show")
}

function closePopup(){
document.getElementById("coolPopup").classList.remove("show")
}

function menuHome(){
document.getElementById("search").value=""
document.querySelectorAll(".product").forEach(p=>p.style.display="block")
window.scrollTo({top:0,behavior:"smooth"})
}

document.getElementById("search").addEventListener("keyup",function(){
let val=this.value.toLowerCase()
document.querySelectorAll(".product").forEach(card=>{
card.style.display=card.innerText.toLowerCase().includes(val)?"":"none"
})
})

tampilProduk()

</script>

</body>
</html>
