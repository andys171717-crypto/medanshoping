<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medanshoping</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: orange;
            padding: 10px;
            text-align: center;
            color: white;
        }

        .logo img {
            max-width: 150px;
        }

        .banner {
            background-color: #FFD700;
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        .search-container {
            display: flex;
            justify-content: center;
            padding: 10px;
            background-color: #fff;
        }

        .search-container input {
            padding: 10px;
            font-size: 16px;
            width: 60%;
        }

        .category-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background-color: #fff;
        }

        .category-container button {
            padding: 10px 20px;
            background-color: orange;
            color: white;
            border: none;
            cursor: pointer;
        }

        .product-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            padding: 20px;
        }

        .product {
            background-color: white;
            width: 22%;
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .product img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .product .product-name {
            font-size: 18px;
            margin-top: 10px;
        }

        .product .product-price {
            color: green;
            font-size: 16px;
            margin-top: 5px;
        }

        .product .product-rating {
            color: gold;
            font-size: 14px;
            margin-top: 5px;
        }

        .product button {
            background-color: orange;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <img src="https://i.imgur.com/6Wy17Gn.jpg" alt="Medanshoping Logo">
        </div>
        <div class="title">Medanshoping</div>
    </header>

    <!-- Promo Banner -->
    <div class="banner">
        🔥 Promo Medanshoping Diskon Sampai 70%! 🔥
    </div>

    <!-- Search Box -->
    <div class="search-container">
        <input type="text" placeholder="Cari produk...">
    </div>

    <!-- Category Buttons -->
    <div class="category-container">
        <button>Semua</button>
        <button>Fashion</button>
        <button>Tas</button>
        <button>Sepatu</button>
    </div>

    <!-- Product Display -->
    <div class="product-container">
        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Baju Fashion">
            <div class="product-name">Baju Fashion</div>
            <div class="product-price">Rp 120.000</div>
            <div class="product-rating">⭐ 4.5</div>
            <button>Tambah Keranjang</button>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Tas Wanita">
            <div class="product-name">Tas Wanita</div>
            <div class="product-price">Rp 150.000</div>
            <div class="product-rating">⭐ 4.6</div>
            <button>Tambah Keranjang</button>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Sepatu Trend">
            <div class="product-name">Sepatu Trend</div>
            <div class="product-price">Rp 200.000</div>
            <div class="product-rating">⭐ 4.7</div>
            <button>Tambah Keranjang</button>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Jaket Pria">
            <div class="product-name">Jaket Pria</div>
            <div class="product-price">Rp 250.000</div>
            <div class="product-rating">⭐ 4.8</div>
            <button>Tambah Keranjang</button>
        </div>
    </div>

</body>
</html>
