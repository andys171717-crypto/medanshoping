<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedanShopping</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo">MedanShopping</div>
        <input type="text" placeholder="Cari produk...">
        <div class="header-icons">
            <img src="keranjang.png" alt="Keranjang">
            <img src="favorit.png" alt="Favorit">
            <img src="menu.png" alt="Menu">
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <section class="intro">
            <h1>Selamat datang di MedanShopping</h1>
            <p>Dapatkan produk terbaik dengan harga terjangkau.</p>
            <button>Belanja Sekarang</button>
        </section>

        <section class="categories">
            <button>Elektronik</button>
            <button>Pakaian</button>
            <button>Perabot</button>
            <button>Gadget</button>
        </section>

        <section class="featured-products">
            <h2>Produk Unggulan</h2>
            <div class="product">
                <img src="product1.jpg" alt="Product 1">
                <h3>Produk 1</h3>
                <p>Rp 100.000</p>
                <button>Tambahkan ke Keranjang</button>
            </div>
            <div class="product">
                <img src="product2.jpg" alt="Product 2">
                <h3>Produk 2</h3>
                <p>Rp 200.000</p>
                <button>Tambahkan ke Keranjang</button>
            </div>
        </section>
    </main>

    <!-- Navigasi seperti Shopee -->
    <footer>
        <nav>
            <button>Beranda</button>
            <button>Live & Video</button>
            <button>Notifikasi</button>
            <button>Saya</button>
        </nav>
    </footer>

    <script src="script.js"></script>
</body>
</html>
