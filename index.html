<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medanshoping - Marketplace</title>
    <style>
        /* Styling untuk navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            background-color: #f8a700;
            padding: 10px;
            color: white;
            align-items: center;
        }

        .navbar a {
            margin: 0 10px;
            color: white;
            text-decoration: none;
        }

        /* Styling untuk produk */
        .product-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
            padding: 20px;
        }

        .product {
            width: 200px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            text-align: center;
            background-color: #fff;
        }

        .product img {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .product h3 {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }

        .product p {
            font-size: 16px;
            margin: 10px 0;
        }

        .product button {
            background-color: #f8a700;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            width: 100%;
            border-radius: 5px;
        }

        /* Styling untuk tombol + dan - */
        .quantity-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .quantity-controls input {
            width: 40px;
            text-align: center;
        }

        /* Styling untuk keranjang */
        #cart-count {
            color: red;
            font-weight: bold;
        }

        /* Promo Banner */
        .promo-banner {
            background-color: #f8a700;
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <!-- Promo Banner -->
    <div class="promo-banner">
        🔥 Promo Medanshoping Diskon Sampai 70%! 🔥
    </div>

    <!-- Navbar -->
    <div class="navbar">
        <span>Medanshoping</span>
        <div>
            <a href="#">Home</a>
            <a href="#">Produk</a>
            <a href="#">Kategori</a>
            <a href="#">Promo</a>
            <a href="#">Kontak</a>
        </div>
        <div>
            <a href="#">Keranjang <span id="cart-count">(0)</span></a>
        </div>
    </div>

    <!-- Produk Section -->
    <div class="product-container">
        <div class="product">
            <img src="images/baju-fashion.jpg" alt="Baju Fashion">
            <h3>Baju Fashion</h3>
            <p>Rp120.000</p>
            <div class="quantity-controls">
                <button id="minus-baju">-</button>
                <input type="number" id="qty-baju" value="1" min="1" />
                <button id="plus-baju">+</button>
            </div>
            <button id="add-baju">Tambah Keranjang</button>
        </div>
        <div class="product">
            <img src="images/tas-wanita.jpg" alt="Tas Wanita">
            <h3>Tas Wanita</h3>
            <p>Rp150.000</p>
            <div class="quantity-controls">
                <button id="minus-tas">-</button>
                <input type="number" id="qty-tas" value="1" min="1" />
                <button id="plus-tas">+</button>
            </div>
            <button id="add-tas">Tambah Keranjang</button>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        let cart = [];

        // Menambahkan produk ke keranjang
        function addToCart(productName, productPrice, quantity) {
            let found = false;
            for (let i = 0; i < cart.length; i++) {
                if (cart[i].name === productName) {
                    cart[i].quantity += quantity;
                    found = true;
                    break;
                }
            }
            if (!found) {
                cart.push({ name: productName, price: productPrice, quantity: quantity });
            }
            updateCart();
        }

        // Memperbarui jumlah di keranjang
        function updateCart() {
            let cartCount = 0;
            for (let i = 0; i < cart.length; i++) {
                cartCount += cart[i].quantity;
            }
            document.getElementById("cart-count").innerText = `(${cartCount})`;
        }

        // Menangani tombol "Tambah Keranjang"
        document.getElementById("add-baju").addEventListener("click", function() {
            let quantity = parseInt(document.getElementById("qty-baju").value);
            addToCart("Baju Fashion", 120000, quantity);
        });

        document.getElementById("add-tas").addEventListener("click", function() {
            let quantity = parseInt(document.getElementById("qty-tas").value);
            addToCart("Tas Wanita", 150000, quantity);
        });

        // Menangani tombol "+" dan "-" untuk mengubah jumlah
        document.getElementById("plus-baju").addEventListener("click", function() {
            let qty = document.getElementById("qty-baju");
            qty.value = parseInt(qty.value) + 1;
        });

        document.getElementById("minus-baju").addEventListener("click", function() {
            let qty = document.getElementById("qty-baju");
            if (qty.value > 1) {
                qty.value = parseInt(qty.value) - 1;
            }
        });

        document.getElementById("plus-tas").addEventListener("click", function() {
            let qty = document.getElementById("qty-tas");
            qty.value = parseInt(qty.value) + 1;
        });

        document.getElementById("minus-tas").addEventListener("click", function() {
            let qty = document.getElementById("qty-tas");
            if (qty.value > 1) {
                qty.value = parseInt(qty.value) - 1;
            }
        });
    </script>
</body>
</html>
