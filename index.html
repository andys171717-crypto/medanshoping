<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Medanshoping</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }
        header {
            background-color: orange;
            color: white;
            text-align: center;
            padding: 10px 0;
        }
        header .logo {
            width: 150px;
        }
        header h1 {
            font-size: 30px;
            margin-top: 10px;
        }
        .promo {
            background-color: yellow;
            color: black;
            padding: 10px;
            font-size: 18px;
            text-align: center;
        }
        .product-container {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .product {
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 200px;
            padding: 10px;
            margin: 10px;
            text-align: center;
            border-radius: 10px;
        }
        .product img {
            width: 100%;
            border-radius: 5px;
        }
        .product h2 {
            font-size: 18px;
            margin-top: 10px;
        }
        .product .price {
            color: green;
            font-size: 16px;
            margin: 10px 0;
        }
        .product .rating {
            color: gold;
            font-size: 14px;
        }
        .product .add-cart {
            background-color: orange;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        .product .add-cart:hover {
            background-color: darkorange;
        }
        .nav-buttons {
            text-align: center;
            margin-top: 20px;
        }
        .nav-buttons button {
            padding: 10px 20px;
            margin: 5px;
            background-color: orange;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        .nav-buttons button:hover {
            background-color: darkorange;
        }
    </style>
</head>
<body>
    <header>
        <img src="https://ibb.co/n4cfgJK" alt="Medanshoping Logo" class="logo">
        <h1>Medanshoping</h1>
    </header>

    <div class="promo">
        <span>🔥 Promo Medanshoping Diskon Sampai 70%! 🔥</span>
    </div>

    <div class="product-container">
        <div class="product">
            <img src="https://i.ibb.co/Z26HHjt/baju.jpg" alt="Baju Fashion">
            <h2>Baju Fashion</h2>
            <div class="price">Rp 120.000</div>
            <div class="rating">⭐ 4.5</div>
            <button class="add-cart">Tambah Keranjang</button>
        </div>
        <div class="product">
            <img src="https://i.ibb.co/Z26HHjt/tas.jpg" alt="Tas Wanita">
            <h2>Tas Wanita</h2>
            <div class="price">Rp 150.000</div>
            <div class="rating">⭐ 4.6</div>
            <button class="add-cart">Tambah Keranjang</button>
        </div>
        <div class="product">
            <img src="https://i.ibb.co/Z26HHjt/sepatu.jpg" alt="Sepatu Trend">
            <h2>Sepatu Trend</h2>
            <div class="price">Rp 200.000</div>
            <div class="rating">⭐ 4.7</div>
            <button class="add-cart">Tambah Keranjang</button>
        </div>
        <div class="product">
            <img src="https://i.ibb.co/Z26HHjt/jaket.jpg" alt="Jaket Pria">
            <h2>Jaket Pria</h2>
            <div class="price">Rp 250.000</div>
            <div class="rating">⭐ 4.8</div>
            <button class="add-cart">Tambah Keranjang</button>
        </div>
    </div>

    <div class="nav-buttons">
        <button>Semua</button>
        <button>Fashion</button>
        <button>Tas</button>
        <button>Sepatu</button>
    </div>
</body>
</html>
