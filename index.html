<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TembungShoping</title><style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
padding-top:75px;
padding-bottom:80px;
}

.header{
background:#2c3e50;
padding:12px;
display:flex;
align-items:center;
gap:12px;
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

.search{
flex:1;
height:42px;
padding:0 16px;
border-radius:25px;
border:none;
outline:none;
}

.icon{
font-size:24px;
color:white;
cursor:pointer;
position:relative;
}

.cart-count{
position:absolute;
top:-5px;
right:-8px;
background:red;
color:white;
font-size:11px;
padding:2px 6px;
border-radius:50%;
}

.menu{
display:grid;
grid-template-columns:repeat(5,1fr);
background:white;
padding:10px;
text-align:center;
font-size:14px;
}

.circle{
width:45px;
height:45px;
background:#3b4f63;
border-radius:50%;
margin:auto;
margin-bottom:5px;
}

.products{
padding:12px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.product{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
position:relative;
}

.product-view{
cursor:pointer;
}

.product img{
width:100%;
height:170px;
object-fit:cover;
}

.badge{
position:absolute;
top:8px;
left:8px;
background:#ff3b30;
color:white;
font-size:11px;
padding:3px 6px;
border-radius:6px;
}

.wishlist{
position:absolute;
top:8px;
right:8px;
background:white;
border-radius:50%;
padding:6px;
}

.info{
padding:10px;
}

.price{
color:#e74c3c;
font-size:20px;
font-weight:bold;
}

.qty-control{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin:8px;
}

.qty-btn{
background:#27ae60;
color:white;
border:none;
width:28px;
height:28px;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.qty-number{
font-size:14px;
min-width:20px;
text-align:center;
}

button{
border:none;
background:#27ae60;
color:white;
border-radius:10px;
padding:10px;
cursor:pointer;
width:100%;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
height:65px;
align-items:center;
box-shadow:0 -3px 12px rgba(0,0,0,0.08);
}

.bottom div{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
cursor:pointer;
}

</style></head><body><div class="header"><input class="search" id="search" placeholder="Cari produk"><div class="icon">🛒
<span id="cartcount" class="cart-count">0</span>
</div><div class="icon">💬</div></div><div class="menu"><div><div class="circle"></div>Pulsa</div>
<div><div class="circle"></div>Promo</div>
<div><div class="circle"></div>Game</div>
<div><div class="circle"></div>Live</div>
<div><div class="circle"></div>Lainnya</div></div><div class="products" id="products"></div><div class="bottom"><div>🏠<span>Beranda</span></div>
<div>📺<span>Live</span></div>
<div>🔔<span>Notifikasi</span></div>
<div>👤<span>Akun</span></div></div><script>

const produk=[
{nama:"Sepatu Nike Sport",harga:100000,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400",qty:0},
{nama:"Headphone Wireless",harga:200000,img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400",qty:0},
{nama:"Jam Tangan Smartwatch",harga:150000,img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400",qty:0},
{nama:"Tas Fashion Wanita",harga:180000,img:"https://images.unsplash.com/photo-1591561954557-26941169b49e?w=400",qty:0}
]

function rupiah(x){
return Number(x).toLocaleString("id-ID")
}

function tampilProduk(){

let html=""

produk.forEach((p,i)=>{

html+=`

<div class="product">

<div class="product-view">

<div class="badge">-30%</div>

<img loading="lazy" src="${p.img}">

<div class="info">

<b>${p.nama}</b>

<div class="price">Rp${rupiah(p.harga)}</div>

</div>

</div>

<div class="qty-control">

<button class="qty-btn" onclick="kurang(${i})">-</button>

<div class="qty-number" id="qty${i}">${p.qty}</div>

<button class="qty-btn" onclick="tambah(${i})">+</button>

</div>

</div>

`

})

document.getElementById("products").innerHTML=html

updateCart()

}

function tambah(i){

produk[i].qty++

updateCart()

document.getElementById("qty"+i).innerText=produk[i].qty

}

function kurang(i){

if(produk[i].qty>0){
produk[i].qty--
updateCart()
document.getElementById("qty"+i).innerText=produk[i].qty
}

}

function updateCart(){

let total=0

produk.forEach(p=>{
total+=p.qty
})

document.getElementById("cartcount").innerText=total

}

tampilProduk()

</script></body>
</html>
