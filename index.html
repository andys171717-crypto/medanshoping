<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedanShopping - Marketplace Online</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
        }

        /* Navbar */
        header {
            background-color: #333;
            color: white;
            padding: 15px 0;
        }

        header .logo a {
            font-size: 26px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            margin-left: 30px;
        }

        header .menu a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
        }

        header .menu a:hover {
            color: #f1c40f;
        }

        .search-bar {
            width: 300px;
            padding: 8px;
            margin: 15px auto;
            display: block;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        /* Banner */
        .banner {
            background: #f1c40f;
            color: white;
            padding: 80px 0;
            text-align: center;
        }

        .banner h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .banner p {
            font-size: 20px;
            margin-bottom: 30px;
        }

        .banner .btn {
            background-color: #333;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
        }

        .banner .btn:hover {
            background-color: #f1c40f;
            color: #333;
        }

        /* Featured Products */
        .products {
            padding: 40px 0;
            text-align: center;
        }

        .products h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        /* Product Cards */
        .product-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .product-item {
            background: white;
            border-radius: 10px;
            margin: 10px;
            padding: 20px;
            width: 220px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease-in-out;
            text-align: center;
        }

        .product-item:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }

        .product-item img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .product-item h3 {
            font-size: 18px;
            margin: 10px 0;
        }

        .product-item p {
            font-size: 16px;
            color: #333;
        }

        .product-item .btn {
            background-color: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 15px;
            font-weight: bold;
        }

        .product-item .btn:hover {
            background-color: #f1c40f;
        }

        /* Footer */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }

        footer a {
            color: #fff;
            text-decoration: none;
            margin: 0 10px;
        }

        footer a:hover {
            color: #f1c40f;
        }

        @media (max-width: 768px) {
            .product-item {
                width: 100%;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <nav>
            <div class="logo">
                <a href="#">MedanShopping</a>
            </div>
            <div class="menu">
                <a href="index.html">Home</a>
                <a href="index.html#products">Products</a>
            </div>
        </nav>
        <input type="text" class="search-bar" placeholder="Cari produk...">
    </header>

    <!-- Banner -->
    <section class="banner">
        <div class="banner-content">
            <h1>Selamat datang di MedanShopping</h1>
            <p>Dapatkan produk terbaik dengan harga terjangkau.</p>
            <a href="index.html#products" class="btn">Belanja Sekarang</a>
        </div>
    </section>

    <!-- Featured Products -->
    <section class="products" id="products">
        <h2>Produk Unggulan</h2>
        <div class="product-list" id="product-list">
            <!-- Produk akan ditambahkan lewat JavaScript -->
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 MedanShopping. All rights reserved.</p>
        <p><a href="#">Privacy Policy</a> | <a href="#">Terms & Conditions</a></p>
    </footer>

    <script>
        // Menampilkan produk dari localStorage atau produk dummy jika belum ada produk
        function renderProducts() {
            const productList = document.getElementById('product-list');
            const products = JSON.parse(localStorage.getItem('products')) || [];

            if (products.length === 0) {
                // Produk dummy jika belum ada produk di localStorage
                const dummyProducts = [
                    { name: 'Produk 1', price: '100,000', image: 'images/no-image.jpg' },
                    { name: 'Produk 2', price: '200,000', image: 'images/no-image.jpg' },
                    { name: 'Produk 3', price: '300,000', image: 'images/no-image.jpg' },
                    { name: 'Produk 4', price: '400,000', image: 'images/no-image.jpg' },
                ];

                // Tampilkan produk dummy
                dummyProducts.forEach((product) => {
                    const productItem = document.createElement('div');
                    productItem.classList.add('product-item');
                    productItem.innerHTML = `
                        <img src="${product.image}" alt="${product.name}">
                        <h3>${product.name}</h3>
                        <p>Rp ${product.price}</p>
                        <button class="btn">Tambahkan ke Keranjang</button>
                    `;
                    productList.appendChild(productItem);
                });
            } else {
                // Tampilkan produk dari localStorage
                products.forEach((product) => {
                    const productItem = document.createElement('div');
                    productItem.classList.add('product-item');
                    productItem.innerHTML = `
                        <img src="${product.image || 'images/no-image.jpg'}" alt="${product.name}">
                        <h3>${product.name}</h3>
                        <p>Rp ${product.price}</p>
                        <button class="btn">Tambahkan ke Keranjang</button>
                    `;
                    productList.appendChild(productItem);
                });
            }
        }

        // Render produk saat halaman dimuat
        renderProducts();
    </script>

</body>
</html>
