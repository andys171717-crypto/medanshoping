<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TembungShoping</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
padding-top:75px;
padding-bottom:80px;
}

.header{
background:#2c3e50;
padding:12px;
display:flex;
align-items:center;
gap:12px;
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
box-sizing:border-box;
}

.search{
flex:1;
height:42px;
padding:0 16px;
border-radius:25px;
border:none;
outline:none;
font-size:14px;
}

.icon{
font-size:24px;
color:white;
cursor:pointer;
position:relative;
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
}

.cart-count{
position:absolute;
top:-4px;
right:-6px;
background:red;
color:white;
font-size:11px;
padding:2px 6px;
border-radius:50%;
}

.menu{
display:grid;
grid-template-columns:repeat(5,1fr);
background:white;
padding:10px;
text-align:center;
font-size:14px;
}

.circle{
width:45px;
height:45px;
background:#3b4f63;
border-radius:50%;
margin:auto;
margin-bottom:5px;
}

.products{
padding:12px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.product{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
}

.product img{
width:100%;
height:170px;
object-fit:cover;
cursor:pointer;
}

.info{
padding:10px;
}

.info b{
font-size:16px;
display:block;
margin-bottom:4px;
}

.rating{color:#ffb400;font-size:14px;}
.sold{font-size:12px;color:#777;}
.free{font-size:11px;color:#27ae60;font-weight:bold;margin:4px 0;}

.price{
color:#e74c3c;
font-size:20px;
font-weight:bold;
margin:6px 0;
}

.product-actions{
display:flex;
gap:8px;
padding:10px;
}

.product-actions button{
flex:1;
border:none;
border-radius:8px;
padding:8px;
font-size:18px;
cursor:pointer;
}

.chat-btn{background:#3498db;color:white;}
.cart-btn{background:#27ae60;color:white;}

.qty-control{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
padding:10px;
}

.qty-control button{
width:35px;
height:35px;
padding:0;
font-size:18px;
}

.qty-input{
width:40px;
text-align:center;
border:none;
background:#eee;
border-radius:6px;
height:32px;
}

.cart-popup{
position:fixed;
top:0;
right:-100%;
width:80%;
height:100%;
background:white;
padding:20px;
overflow:auto;
z-index:1000;
transition:0.3s;
}

.cart-popup.active{
right:0;
}

.cart-item{
border-bottom:1px solid #eee;
padding:10px 0;
}

.cart-qty{
display:flex;
gap:8px;
align-items:center;
margin-top:6px;
}

.cart-qty button{
width:30px;
height:30px;
padding:0;
}

.remove-btn{
background:#e74c3c;
margin-top:6px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
height:65px;
box-shadow:0 -3px 12px rgba(0,0,0,0.08);
}

.bottom div{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
cursor:pointer;
}

.icon-bottom{font-size:22px;}

.cool-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:.3s;
z-index:2000;
}

.cool-popup.show{
opacity:1;
pointer-events:auto;
}

.popup-box{
background:white;
padding:25px;
border-radius:20px;
width:80%;
max-width:320px;
text-align:center;
}

.detail-popup{
position:fixed;
bottom:-100%;
left:0;
width:100%;
background:white;
border-radius:20px 20px 0 0;
padding:20px;
transition:.3s;
z-index:3000;
}

.detail-popup.show{
bottom:0;
}

.detail-popup img{
width:100%;
border-radius:10px;
}

.desc{
font-size:14px;
color:#555;
line-height:1.5;
margin-top:10px;
}

</style>
</head>

<body>

<div class="header">

<input class="search" id="search" placeholder="Cari produk di TembungShoping">

<div class="icon" onclick="toggleCart()">🛒
<span id="cartcount" class="cart-count">0</span>
</div>

<div class="icon" onclick="chatAdmin()">💬</div>

</div>

<div class="menu">
<div onclick="devAlert()"><div class="circle"></div>Pulsa</div>
<div onclick="devAlert()"><div class="circle"></div>Promo</div>
<div onclick="devAlert()"><div class="circle"></div>Game</div>
<div onclick="devAlert()"><div class="circle"></div>Live</div>
<div onclick="devAlert()"><div class="circle"></div>Lainnya</div>
</div>

<div class="products" id="products"></div>

<div class="cart-popup" id="cartpopup">
<button onclick="toggleCart()">Tutup</button>
<h2>Keranjang</h2>
<div id="cartitems"></div>
</div>

<div class="bottom">
<div onclick="menuHome()"><span class="icon-bottom">🏠</span>Beranda</div>
<div onclick="devAlert()"><span class="icon-bottom">📺</span>Live</div>
<div onclick="devAlert()"><span class="icon-bottom">🔔</span>Notifikasi</div>
<div onclick="devAlert()"><span class="icon-bottom">👤</span>Akun</div>
</div>

<div id="coolPopup" class="cool-popup">
<div class="popup-box">
<h2>🚀 Fitur Baru Segera Hadir</h2>
<p>Kami sedang menyiapkan fitur baru untuk meningkatkan pengalaman belanja kamu.</p>
<button onclick="closePopup()">Mengerti</button>
</div>
</div>

<div id="detailPopup" class="detail-popup">

<img id="detailImg">
<h2 id="detailNama"></h2>
<p id="detailSold"></p>
<h3 id="detailHarga"></h3>
<p id="detailDesc" class="desc"></p>

<div class="qty-control">
<button onclick="detailMinus()">-</button>
<input id="detailQty" class="qty-input" value="1">
<button onclick="detailPlus()">+</button>
</div>

<button onclick="addDetailCart()">Tambah ke Keranjang</button>

<br><br>

<button onclick="closeDetail()">Tutup</button>

</div>

<script>

/* PRODUK TETAP 8 */

const produk=[ ... SAME AS FILE ASLI ... ]

let cart=JSON.parse(localStorage.getItem("cart"))||[]
let selectedProduk=null

function rupiah(x){
return Number(x).toLocaleString("id-ID")
}

function tampilProduk(list=produk){

let html=""

list.forEach((p,i)=>{

html+=`

<div class="product">

<img src="${p.img}" onclick="showDetail(${i})">

<div class="info">
<b>${p.nama}</b>
<div class="rating">⭐⭐⭐⭐☆</div>
<div class="sold">Terjual ${p.sold}</div>
<div class="free">Gratis Ongkir</div>
<div class="price">Rp${rupiah(p.harga)}</div>
</div>

<div class="product-actions">
<button class="chat-btn" onclick="chatAdmin()">💬</button>
<button class="cart-btn" onclick="plusQty(${i})">🛒</button>
</div>

<div class="qty-control">
<button onclick="minusQty(${i})">-</button>
<input class="qty-input" id="qty${i}" value="0">
<button onclick="plusQty(${i})">+</button>
</div>

</div>

`
})

document.getElementById("products").innerHTML=html
syncQty()

}

/* SISA SCRIPT ASLI TIDAK DIUBAH */

</script>

</body>
</html>
