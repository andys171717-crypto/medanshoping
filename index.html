<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medanshoping</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f2f2f2;
    }

    header {
      background: #ff6600;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
    }

    .menu {
      display: flex;
      gap: 10px;
    }

    .btn {
      background: white;
      color: #ff6600;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .banner {
      background: #ffd000;
      padding: 10px;
      text-align: center;
      font-weight: bold;
    }

    .search {
      padding: 15px;
    }

    .search input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .kategori {
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    .kategori button {
      border: 1px solid #ddd;
      background: white;
      padding: 6px 10px;
      border-radius: 20px;
      cursor: pointer;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      position: relative;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
    }

    .wishlist {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 20px;
      cursor: pointer;
    }

    .rating {
      color: orange;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    button {
      background: #ff6600;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .qty {
      display: flex;
      justify-content: center;
      gap: 6px;
      align-items: center;
      margin-top: 8px;
    }

    .qty input {
      width: 45px;
      text-align: center;
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: #ff6600;
      padding: 10px 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .footer div {
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    /* Login Section */
    #loginForm {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f9f9f9;
    }

    #loginForm input {
      padding: 10px;
      margin: 10px;
      width: 200px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    #loginForm button {
      background-color: #ff6600;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    #loginLinks {
      margin-top: 10px;
      display: flex;
      gap: 20px;
    }

    #loginLinks a {
      color: #ff6600;
      cursor: pointer;
    }

    /* Daftar, Lupa Password & Keamanan */
    #daftarForm, #lupaForm {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f9f9f9;
    }

    #daftarForm input, #lupaForm input {
      padding: 10px;
      margin: 10px;
      width: 200px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    #daftarForm button, #lupaForm button {
      background-color: #ff6600;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <!-- Login Form -->
  <div id="loginForm">
    <h2>Login Medanshoping</h2>
    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Login</button>
    <div id="loginLinks">
      <a href="#" onclick="showDaftar()">Daftar</a>
      <a href="#" onclick="showLupa()">Lupa Password</a>
    </div>
  </div>

  <!-- Daftar Form -->
  <div id="daftarForm">
    <h2>Daftar Medanshoping</h2>
    <input type="text" id="newUsername" placeholder="Username" />
    <input type="password" id="newPassword" placeholder="Password" />
    <input type="password" id="confirmPassword" placeholder="Konfirmasi Password" />
    <select id="securityQuestion">
      <option value="pet">Nama hewan peliharaan pertama</option>
      <option value="school">Nama sekolah pertama</option>
      <option value="city">Kota tempat tinggal pertama</option>
    </select>
    <input type="text" id="securityAnswer" placeholder="Jawaban Pertanyaan Keamanan" />
    <button onclick="register()">Daftar</button>
    <div id="backToLogin"><a href="#" onclick="showLogin()">Kembali ke Login</a></div>
  </div>

  <!-- Lupa Password Form -->
  <div id="lupaForm">
    <h2>Lupa Password</h2>
    <input type="text" id="emailReset" placeholder="Email" />
    <select id="resetQuestion">
      <option value="pet">Nama hewan peliharaan pertama</option>
      <option value="school">Nama sekolah pertama</option>
      <option value="city">Kota tempat tinggal pertama</option>
    </select>
    <input type="text" id="resetAnswer" placeholder="Jawaban Pertanyaan Keamanan" />
    <button onclick="resetPassword()">Reset Password</button>
    <div id="backToLoginFromReset"><a href="#" onclick="showLogin()">Kembali ke Login</a></div>
  </div>

  <header id="header" style="display:none;">
    🛒 Medanshoping
    <div class="menu">
      <div class="btn">❤️</div>
      <div class="btn" onclick="bukaCart()">Keranjang (<span id="totalCart">0</span>)</div>
    </div>
  </header>

  <!-- Banner & Menu -->
  <div class="banner" style="display:none;" id="banner">
    🔥 Promo Medanshoping Diskon Sampai 70% 🔥
  </div>
  <div class="search" style="display:none;" id="search">
    <input type="text" placeholder="Cari produk..." onkeyup="cariProduk(this.value)">
  </div>

  <div class="kategori" style="display:none;" id="kategori">
    <button onclick="filterKategori('all')">Semua</button>
    <button onclick="filterKategori('fashion')">Fashion</button>
    <button onclick="filterKategori('tas')">Tas</button>
    <button onclick="filterKategori('sepatu')">Sepatu</button>
  </div>

  <div class="products" id="productList" style="display:none;"></div>

  <div id="cartBox">
    <h2>Keranjang</h2>
    <div id="cartItems"></div>
    <h3>Total: Rp<span id="totalHarga">0</span></h3>
    <br>
    <button onclick="checkout()">Checkout</button>
    <br><br>
    <button onclick="tutupCart()">Tutup</button>
  </div>

  <div id="detail"></div>

  <script>
    // JavaScript functions for login, register, forgot password, etc.
    function showLogin() {
      document.getElementById("loginForm").style.display = "flex";
      document.getElementById("daftarForm").style.display = "none";
      document.getElementById("lupaForm").style.display = "none";
    }

    function showDaftar() {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("daftarForm").style.display = "flex";
      document.getElementById("lupaForm").style.display = "none";
    }

    function showLupa() {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("daftarForm").style.display = "none";
      document.getElementById("lupaForm").style.display = "flex";
    }

    function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      if (username === "user" && password === "password") {
        localStorage.setItem("isLoggedIn", true);
        tampilProduk(produk);
        document.getElementById("loginForm").style.display = "none";
        document.getElementById("header").style.display = "flex";
        document.getElementById("banner").style.display = "block";
        document.getElementById("search").style.display = "block";
        document.getElementById("kategori").style.display = "block";
      } else {
        alert("Username atau password salah!");
      }
    }

    function register() {
      const username = document.getElementById("newUsername").value;
      const password = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const securityQuestion = document.getElementById("securityQuestion").value;
      const securityAnswer = document.getElementById("securityAnswer").value;

      if (password === confirmPassword) {
        localStorage.setItem("username", username);
        localStorage.setItem("password", password);
        localStorage.setItem("securityQuestion", securityQuestion);
        localStorage.setItem("securityAnswer", securityAnswer);
        alert("Akun berhasil dibuat, silakan login!");
        showLogin();
      } else {
        alert("Password tidak cocok!");
      }
    }

    function resetPassword() {
      const email = document.getElementById("emailReset").value;
      const resetAnswer = document.getElementById("resetAnswer").value;

      if (resetAnswer === localStorage.getItem("securityAnswer")) {
        alert("Password telah berhasil direset!");
        showLogin();
      } else {
        alert("Jawaban pertanyaan keamanan salah!");
      }
    }
  </script>
</body>
</html>
