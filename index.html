<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medanshoping</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
        }

        header {
            background-color: #ff7f00;
            color: white;
            padding: 10px 20px;
            text-align: center;
            font-size: 24px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }

        .product {
            background-color: white;
            border-radius: 8px;
            width: 250px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            padding: 15px;
            margin: 0 15px;
        }

        .product img {
            max-width: 100%;
            border-radius: 8px;
        }

        .product h3 {
            margin-top: 10px;
            font-size: 18px;
            color: #333;
        }

        .product p {
            color: #ff7f00;
            font-size: 16px;
            font-weight: bold;
        }

        .product button {
            background-color: #ff7f00;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        .product button:hover {
            background-color: #e66e00;
        }
    </style>
</head>
<body>

    <header>
        Medanshoping
    </header>

    <div class="container">
        <div class="product">
            <img src="https://via.placeholder.com/250" alt="Product 1">
            <h3>Baju Fashion</h3>
            <p>Rp 120.000</p>
            <button>Tambah Keranjang</button>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/250" alt="Product 2">
            <h3>Tas Wanita</h3>
            <p>Rp 150.000</p>
            <button>Tambah Keranjang</button>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/250" alt="Product 3">
            <h3>Sepatu Trend</h3>
            <p>Rp 200.000</p>
            <button>Tambah Keranjang</button>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/250" alt="Product 4">
            <h3>Jaket Pria</h3>
            <p>Rp 250.000</p>
            <button>Tambah Keranjang</button>
        </div>
    </div>

</body>
</html>
