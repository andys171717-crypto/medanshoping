<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medanshoping</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f2f2f2;
        }

        header {
            background: #ff6600;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: white;
            color: #ff6600;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .banner {
            background: #ffd000;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            position: sticky;
            top: 50px;
            z-index: 99;
        }

        /* Products Section */
        .products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
        }

        .rating {
            color: orange;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        button {
            background: #ff6600;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .qty {
            display: flex;
            justify-content: center;
            gap: 6px;
            align-items: center;
            margin-top: 8px;
        }

        .qty input {
            width: 45px;
            text-align: center;
        }
    </style>
</head>

<body>

    <header>
        <span>🛒 Medanshoping</span>
    </header>

    <div class="banner">
        🔥 Promo Medanshoping Diskon Sampai 70%!
    </div>

    <div class="products" id="productList">
        <!-- Produk akan ditampilkan di sini -->
    </div>

    <script>
        // Data produk
        let produk = [
            { nama: "Baju Fashion", harga: 120000, rating: 4.5, gambar: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500" },
            { nama: "Tas Wanita", harga: 150000, rating: 4.6, gambar: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500" },
            { nama: "Sepatu Trend", harga: 200000, rating: 4.7, gambar: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500" },
            { nama: "Jaket Pria", harga: 250000, rating: 4.8, gambar: "https://images.unsplash.com/photo-1520975661595-6453be3f7070?w=500" }
        ];

        // Menampilkan produk
        function tampilProduk() {
            let html = "";
            produk.forEach((p) => {
                html += `
                    <div class="card">
                        <img src="${p.gambar}" alt="${p.nama}">
                        <h3>${p.nama}</h3>
                        <div class="rating">⭐ ${p.rating}</div>
                        <p class="price">Rp${p.harga.toLocaleString()}</p>
                        <button>Tambah Keranjang</button>
                    </div>
                `;
            });
            document.getElementById("productList").innerHTML = html;
        }

        // Memanggil fungsi untuk menampilkan produk
        tampilProduk();
    </script>

</body>

</html>
