<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TembungShoping</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f2f2f2;
}

/* HEADER */

.header{
background:#34495e;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.search{
flex:1;
padding:8px 12px;
border-radius:20px;
border:none;
}

.icon{
font-size:20px;
color:white;
cursor:pointer;
}

/* MENU */

.menu{
display:grid;
grid-template-columns:repeat(5,1fr);
background:white;
padding:15px;
text-align:center;
}

.menu-item{
font-size:12px;
cursor:pointer;
}

.menu-icon{
width:45px;
height:45px;
background:#34495e;
border-radius:50%;
margin:auto;
margin-bottom:5px;
}

/* PRODUK */

.products{
padding:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
cursor:pointer;
}

.product img{
width:100%;
border-radius:6px;
}

.price{
color:#e74c3c;
font-weight:bold;
}

/* BOTTOM MENU */

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 -2px 5px rgba(0,0,0,0.1);
}

.bottom div{
text-align:center;
font-size:12px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<input class="search" id="search" placeholder="Cari produk di TembungShoping">

<div class="icon" onclick="cart()">🛒</div>
<div class="icon" onclick="chat()">💬</div>

</div>

<!-- MENU -->

<div class="menu">

<div class="menu-item" onclick="menu('Pulsa')">
<div class="menu-icon"></div>
Pulsa
</div>

<div class="menu-item" onclick="menu('Promo')">
<div class="menu-icon"></div>
Promo
</div>

<div class="menu-item" onclick="menu('Game')">
<div class="menu-icon"></div>
Game
</div>

<div class="menu-item" onclick="menu('Live')">
<div class="menu-icon"></div>
Live
</div>

<div class="menu-item" onclick="menu('Lainnya')">
<div class="menu-icon"></div>
Lainnya
</div>

</div>

<!-- PRODUK -->

<div class="products" id="products">

<div class="product" onclick="detail('Sepatu Sport','100000')">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<p>Sepatu Sport</p>
<div class="price">Rp100.000</div>
</div>

<div class="product" onclick="detail('Headphone Gaming','200000')">
<img src="https://images.unsplash.com/photo-1518441902117-bb3f7d7b14f1">
<p>Headphone Gaming</p>
<div class="price">Rp200.000</div>
</div>

<div class="product" onclick="detail('Jam Tangan','150000')">
<img src="https://images.unsplash.com/photo-1519741497674-611481863552">
<p>Jam Tangan</p>
<div class="price">Rp150.000</div>
</div>

<div class="product" onclick="detail('Tas Fashion','180000')">
<img src="https://images.unsplash.com/photo-1593032465171-8c3c0c4d6d7f">
<p>Tas Fashion</p>
<div class="price">Rp180.000</div>
</div>

</div>

<!-- BOTTOM -->

<div class="bottom">

<div onclick="home()">🏠<br>Beranda</div>
<div onclick="live()">📺<br>Live</div>
<div onclick="notif()">🔔<br>Notif</div>
<div onclick="akun()">👤<br>Akun</div>

</div>

<script>

/* MENU */

function menu(nama){
alert("Menu "+nama+" dibuka")
}

/* CART */

function cart(){
alert("Keranjang belanja")
}

/* CHAT */

function chat(){
alert("Chat penjual")
}

/* DETAIL PRODUK */

function detail(nama,harga){
alert("Produk: "+nama+"\nHarga: Rp"+harga)
}

/* BOTTOM MENU */

function home(){
alert("Beranda")
}

function live(){
alert("Live streaming")
}

function notif(){
alert("Notifikasi")
}

function akun(){
alert("Halaman akun")
}

/* SEARCH */

document.getElementById("search").addEventListener("keyup",function(){

let input=this.value.toLowerCase()
let products=document.querySelectorAll(".product")

products.forEach(p=>{
let text=p.innerText.toLowerCase()

if(text.includes(input)){
p.style.display="block"
}else{
p.style.display="none"
}

})

})

</script>

</body>
</html>
