<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TembungShoping</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:system-ui;
background:#f3f4f6;
padding-top:60px;
padding-bottom:80px;
}

/* HEADER */

.header{
position:fixed;
top:0;
width:100%;
height:60px;
background:#2c3e50;
display:flex;
align-items:center;
padding:10px;
gap:10px;
z-index:999;
}

.search{
flex:1;
height:38px;
border:none;
border-radius:20px;
padding:0 15px;
}

.icon{
color:white;
font-size:22px;
position:relative;
}

.badge{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:white;
font-size:11px;
padding:2px 6px;
border-radius:50%;
}

/* BANNER */

.banner{
margin:10px;
border-radius:12px;
overflow:hidden;
}

.banner img{
width:100%;
height:130px;
object-fit:cover;
}

/* MENU */

.menu{
display:grid;
grid-template-columns:repeat(5,1fr);
background:white;
padding:12px 0;
text-align:center;
font-size:12px;
}

.circle{
width:45px;
height:45px;
background:#e8ecf1;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:5px;
font-size:20px;
}

/* PRODUCTS */

.products{
padding:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.product{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
position:relative;
}

.product img{
width:100%;
height:160px;
object-fit:cover;
}

.discount{
position:absolute;
top:8px;
left:8px;
background:#e74c3c;
color:white;
font-size:11px;
padding:3px 6px;
border-radius:6px;
}

.info{
padding:10px;
}

.title{
font-size:14px;
font-weight:600;
height:34px;
overflow:hidden;
}

.rating{
color:#f1c40f;
font-size:12px;
}

.free{
font-size:12px;
color:#27ae60;
}

.price{
font-size:17px;
font-weight:bold;
color:#e74c3c;
}

/* BUTTONS */

.actions{
display:flex;
gap:6px;
padding:10px;
}

.btn{
flex:1;
border:none;
padding:10px;
border-radius:10px;
color:white;
font-size:14px;
}

.like{background:#e74c3c;}
.chat{background:#3498db;}
.cart{background:#27ae60;}

/* CART POPUP */

.cartbox{
position:fixed;
right:10px;
top:70px;
background:white;
width:250px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
display:none;
padding:10px;
z-index:999;
}

/* BOTTOM */

.bottom{
position:fixed;
bottom:0;
width:100%;
height:75px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -3px 15px rgba(0,0,0,0.1);
font-size:13px;
}

.bottom i{
font-size:22px;
display:block;
margin-bottom:4px;
}

</style>

</head>

<body>

<div class="header">

<input id="search" class="search" placeholder="Cari produk">

<div class="icon" onclick="toggleCart()">
<i class="fa-solid fa-cart-shopping"></i>
<span id="cartcount" class="badge">0</span>
</div>

<div class="icon" onclick="chatAdmin()">
<i class="fa-solid fa-comment"></i>
</div>

</div>

<div class="cartbox" id="cartbox">
<b>Keranjang</b>
<div id="cartitems"></div>
</div>

<div class="banner">
<img src="https://images.unsplash.com/photo-1607082349566-187342175e2f?w=900">
</div>

<div class="menu">

<div><div class="circle">📱</div>Pulsa</div>
<div><div class="circle">🔥</div>Promo</div>
<div><div class="circle">🎮</div>Game</div>
<div><div class="circle">📺</div>Live</div>
<div><div class="circle">📦</div>Lainnya</div>

</div>

<div class="products" id="products"></div>

<div class="bottom">

<div><i class="fa-solid fa-house"></i>Home</div>
<div><i class="fa-solid fa-fire"></i>Promo</div>
<div><i class="fa-solid fa-bell"></i>Notif</div>
<div><i class="fa-solid fa-user"></i>Akun</div>

</div>

<script>

let cart=0;

const produk=[

{nama:"Sepatu Nike Sport",harga:100000,disc:"50%",img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400"},
{nama:"Headphone Wireless",harga:200000,disc:"30%",img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400"},
{nama:"Smartwatch",harga:150000,disc:"20%",img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400"},
{nama:"Tas Fashion Wanita",harga:180000,disc:"40%",img:"https://images.unsplash.com/photo-1591561954557-26941169b49e?w=400"},
{nama:"Kacamata Fashion",harga:90000,disc:"25%",img:"https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=400"},
{nama:"Parfum Premium",harga:120000,disc:"35%",img:"https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=400"}

];

function rupiah(x){
return x.toLocaleString("id-ID");
}

function tampilProduk(){

let html="";

produk.forEach(p=>{

html+=`

<div class="product">

<div class="discount">${p.disc}</div>

<img src="${p.img}" loading="lazy">

<div class="info">

<div class="title">${p.nama}</div>

<div class="rating">
⭐ ⭐ ⭐ ⭐ ☆
</div>

<div class="free">Gratis Ongkir</div>

<div class="price">Rp${rupiah(p.harga)}</div>

</div>

<div class="actions">

<button class="btn like">
<i class="fa-solid fa-heart"></i>
</button>

<button class="btn chat" onclick="chatAdmin()">
<i class="fa-solid fa-comment"></i>
</button>

<button class="btn cart" onclick="addCart('${p.nama}')">
<i class="fa-solid fa-cart-shopping"></i>
</button>

</div>

</div>

`;

});

document.getElementById("products").innerHTML=html;

}

tampilProduk();

function addCart(nama){

cart++;

document.getElementById("cartcount").innerText=cart;

let item=document.createElement("div");
item.innerText=nama;

document.getElementById("cartitems").appendChild(item);

}

function toggleCart(){

let box=document.getElementById("cartbox");

box.style.display = box.style.display=="block" ? "none":"block";

}

function chatAdmin(){

window.open("https://wa.me/6281220549530");

}

/* SEARCH */

document.getElementById("search").oninput=function(){

let v=this.value.toLowerCase();

let hasil=produk.filter(p=>p.nama.toLowerCase().includes(v));

let html="";

hasil.forEach(p=>{

html+=`

<div class="product">

<img src="${p.img}">

<div class="info">

<div class="title">${p.nama}</div>
<div class="price">Rp${rupiah(p.harga)}</div>

</div>

</div>

`;

});

document.getElementById("products").innerHTML=html;

}

</script>

</body>

</html>
