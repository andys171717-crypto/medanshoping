<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TembungShoping</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:system-ui;
background:#f5f5f5;
padding-top:65px;
padding-bottom:85px;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
background:linear-gradient(90deg,#ff6a00,#ff3d00);
display:flex;
align-items:center;
gap:6px;
padding:0 10px;
z-index:1000;
}

.search{
flex:1;
height:36px;
border:none;
border-radius:20px;
padding:0 12px;
font-size:14px;
}

.icon{
width:34px;
height:34px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
position:relative;
}

.badge{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
font-size:10px;
padding:2px 6px;
border-radius:50%;
}

/* BANNER */

.banner{
margin:10px;
border-radius:12px;
overflow:hidden;
}

.banner img{
width:100%;
height:140px;
object-fit:cover;
}

/* CATEGORY */

.category{
display:flex;
overflow-x:auto;
gap:14px;
padding:10px;
background:white;
}

.cat{
text-align:center;
min-width:60px;
font-size:12px;
}

.circle{
width:45px;
height:45px;
border-radius:50%;
background:#eef1f4;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
margin:auto;
margin-bottom:5px;
}

/* FLASH SALE */

.flash{
background:white;
margin:10px;
border-radius:12px;
padding:10px;
}

.flash-header{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:8px;
}

.flash-products{
display:flex;
overflow-x:auto;
gap:10px;
}

.flash-item{
min-width:120px;
background:white;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.flash-item img{
width:100%;
height:100px;
object-fit:cover;
border-radius:10px 10px 0 0;
}

.flash-price{
padding:6px;
color:#e74c3c;
font-weight:bold;
}

/* PRODUCTS */

.products{
padding:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.product{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.product img{
width:100%;
height:160px;
object-fit:cover;
}

.info{
padding:10px;
}

.title{
font-size:14px;
font-weight:600;
height:34px;
overflow:hidden;
}

.rating{
color:#f1c40f;
font-size:12px;
}

.sold{
font-size:11px;
color:#777;
}

.price{
font-size:17px;
color:#e74c3c;
font-weight:bold;
}

/* BUTTON */

.actions{
display:flex;
gap:6px;
padding:10px;
}

.btn{
flex:1;
border:none;
padding:8px;
border-radius:8px;
color:white;
}

.like{background:#e74c3c;}
.chat{background:#3498db;}
.cart{background:#27ae60;}

/* BOTTOM NAV */

.bottom{
position:fixed;
bottom:0;
width:100%;
height:75px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -3px 10px rgba(0,0,0,0.15);
font-size:13px;
}

.bottom i{
font-size:22px;
display:block;
margin-bottom:4px;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<input class="search" placeholder="Cari produk di TembungShoping">

<div class="icon">
<i class="fa-solid fa-cart-shopping"></i>
<span class="badge">0</span>
</div>

<div class="icon">
<i class="fa-solid fa-comment"></i>
</div>

</div>

<!-- BANNER -->

<div class="banner">
<img src="https://images.unsplash.com/photo-1607082349566-187342175e2f?w=900">
</div>

<!-- CATEGORY -->

<div class="category">

<div class="cat"><div class="circle">📱</div>Pulsa</div>
<div class="cat"><div class="circle">🔥</div>Promo</div>
<div class="cat"><div class="circle">🎮</div>Game</div>
<div class="cat"><div class="circle">📺</div>Live</div>
<div class="cat"><div class="circle">👕</div>Fashion</div>
<div class="cat"><div class="circle">💄</div>Beauty</div>
<div class="cat"><div class="circle">📦</div>Lainnya</div>

</div>

<!-- FLASH SALE -->

<div class="flash">

<div class="flash-header">
<span>🔥 Flash Sale</span>
<span id="timer">02:00:00</span>
</div>

<div class="flash-products">

<div class="flash-item">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300">
<div class="flash-price">Rp80.000</div>
</div>

<div class="flash-item">
<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300">
<div class="flash-price">Rp150.000</div>
</div>

</div>

</div>

<!-- PRODUCTS -->

<div class="products">

<div class="product">

<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400">

<div class="info">

<div class="title">Sepatu Nike Sport</div>

<div class="rating">⭐ ⭐ ⭐ ⭐ ☆</div>

<div class="sold">Terjual 120+</div>

<div class="price">Rp100.000</div>

</div>

<div class="actions">

<button class="btn like"><i class="fa-solid fa-heart"></i></button>
<button class="btn chat"><i class="fa-solid fa-comment"></i></button>
<button class="btn cart"><i class="fa-solid fa-cart-shopping"></i></button>

</div>

</div>

<div class="product">

<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400">

<div class="info">

<div class="title">Headphone Wireless</div>

<div class="rating">⭐ ⭐ ⭐ ⭐ ☆</div>

<div class="sold">Terjual 100+</div>

<div class="price">Rp200.000</div>

</div>

<div class="actions">

<button class="btn like"><i class="fa-solid fa-heart"></i></button>
<button class="btn chat"><i class="fa-solid fa-comment"></i></button>
<button class="btn cart"><i class="fa-solid fa-cart-shopping"></i></button>

</div>

</div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom">

<div><i class="fa-solid fa-house"></i>Home</div>
<div><i class="fa-solid fa-fire"></i>Promo</div>
<div><i class="fa-solid fa-bell"></i>Notif</div>
<div><i class="fa-solid fa-user"></i>Akun</div>

</div>

<script>

/* FLASH SALE TIMER */

let time=7200;

setInterval(()=>{

time--;

let h=Math.floor(time/3600);
let m=Math.floor((time%3600)/60);
let s=time%60;

document.getElementById("timer").innerText=
h+":"+m+":"+s;

},1000);

</script>

</body>
</html>
