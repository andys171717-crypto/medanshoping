<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medanshoping</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#ff6600;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
font-size:20px;
}

.cart{
background:white;
color:#ff6600;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.banner{
background:#ffcc00;
text-align:center;
padding:10px;
font-weight:bold;
}

.search{
padding:15px;
}

.search input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}

.price{
color:green;
font-weight:bold;
}

button{
background:#ff6600;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
margin-top:8px;
cursor:pointer;
}

#cartBox{
position:fixed;
top:0;
right:-100%;
width:280px;
height:100%;
background:white;
box-shadow:-3px 0 8px rgba(0,0,0,0.3);
padding:15px;
transition:0.3s;
overflow:auto;
}

#detail{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
padding:20px;
overflow:auto;
}

#detail img{
width:100%;
border-radius:10px;
}

.rating{
color:orange;
}

</style>
</head>

<body>

<header>
🛒 Medanshoping
<div class="cart" onclick="bukaCart()">Keranjang (<span id="totalCart">0</span>)</div>
</header>

<div class="banner">
🔥 Promo Medanshoping Diskon Sampai 70%
</div>

<div class="search">
<input type="text" placeholder="Cari produk..." onkeyup="cariProduk(this.value)">
</div>

<div class="products" id="productList"></div>

<div id="cartBox">

<h2>Keranjang</h2>

<div id="cartItems"></div>

<h3>Total: Rp<span id="totalHarga">0</span></h3>

<button onclick="checkout()">Checkout</button>

<br><br>

<button onclick="tutupCart()">Tutup</button>

</div>

<div id="detail"></div>

<script>

let produk=[

{
nama:"Baju Fashion",
harga:120000,
rating:4.5,
gambar:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500",
deskripsi:"Baju fashion modern nyaman dipakai."
},

{
nama:"Tas Wanita",
harga:150000,
rating:4.6,
gambar:"https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500",
deskripsi:"Tas wanita elegan cocok untuk semua acara."
},

{
nama:"Sepatu Trend",
harga:200000,
rating:4.7,
gambar:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500",
deskripsi:"Sepatu trend terbaru kualitas premium."
},

{
nama:"Jaket Pria",
harga:250000,
rating:4.8,
gambar:"https://images.unsplash.com/photo-1520975661595-6453be3f7070?w=500",
deskripsi:"Jaket pria stylish dan hangat."
}

]

let keranjang=[]

function tampilProduk(data){

let html=""

data.forEach((p,i)=>{

html+=`

<div class="card">

<img src="${p.gambar}" onclick="detail(${i})">

<h3>${p.nama}</h3>

<div class="rating">⭐ ${p.rating}</div>

<p class="price">Rp${p.harga.toLocaleString()}</p>

<button onclick="beli(${i})">Beli</button>

</div>

`

})

document.getElementById("productList").innerHTML=html

}

function detail(i){

let p=produk[i]

document.getElementById("detail").style.display="block"

document.getElementById("detail").innerHTML=`

<button onclick="tutupDetail()">⬅ Kembali</button>

<h2>${p.nama}</h2>

<img src="${p.gambar}">

<p class="rating">⭐ ${p.rating}</p>

<p>${p.deskripsi}</p>

<h3>Rp${p.harga.toLocaleString()}</h3>

<button onclick="beli(${i})">Tambah Keranjang</button>

`

}

function tutupDetail(){
document.getElementById("detail").style.display="none"
}

function beli(i){

keranjang.push(produk[i])

updateCart()

alert("Produk ditambahkan ke keranjang")

}

function updateCart(){

document.getElementById("totalCart").innerText=keranjang.length

let html=""
let total=0

keranjang.forEach((p)=>{

total+=p.harga

html+=`<p>${p.nama} - Rp${p.harga.toLocaleString()}</p>`

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("totalHarga").innerText=total.toLocaleString()

}

function bukaCart(){
document.getElementById("cartBox").style.right="0"
}

function tutupCart(){
document.getElementById("cartBox").style.right="-100%"
}

function cariProduk(text){

let hasil=produk.filter(p=>p.nama.toLowerCase().includes(text.toLowerCase()))

tampilProduk(hasil)

}

function checkout(){

let pesan="Halo Medanshoping,%0A%0ASaya ingin membeli:%0A"

keranjang.forEach((p)=>{

pesan+=p.nama+" - Rp"+p.harga+"%0A"

})

window.open("https://wa.me/?text="+pesan)

}

tampilProduk(produk)

</script>

</body>
</html>
