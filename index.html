<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medanshoping</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            box-sizing: border-box;
        }

        /* Header Styles */
        header {
            background-color: #ff6600;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 10;
        }

        header .logo {
            font-weight: bold;
            font-size: 24px;
        }

        header .menu {
            display: flex;
            gap: 10px;
        }

        header .btn {
            background-color: #ff6600;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #ff6600;
        }

        header .btn:hover {
            background-color: #e55b00;
        }

        /* Banner Styles */
        .banner {
            background-color: #ffd000;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            margin-top: 60px;
        }

        /* Search Bar Styles */
        .search input {
            width: 80%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background-color: #ff6600;
            color: white;
            font-size: 16px;
            margin: 10px 0;
        }

        /* Category Button Styles */
        .kategori {
            display: flex;
            gap: 10px;
            margin-top: 20px; /* Create space for header */
            background-color: #ff6600;
            position: fixed;
            top: 140px; /* Ensure it is fixed just below the banner */
            width: 100%;
            padding: 10px 0;
            z-index: 9;
        }

        .kategori button {
            background-color: #ff6600;
            color: white;
            border: 1px solid #ddd;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        .kategori button:hover {
            background-color: #ff9900;
        }

        /* Product Grid Styles */
        .products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 200px; /* Adjusted for fixed header and category */
            padding: 0 15px;
        }

        .card {
            background-color: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            position: relative;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }

        .wishlist {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 20px;
            cursor: pointer;
        }

        .rating {
            color: orange;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        .qty {
            display: flex;
            justify-content: center;
            gap: 6px;
            align-items: center;
            margin-top: 8px;
        }

        .qty input {
            width: 45px;
            text-align: center;
        }

        /* Product Button */
        .btn {
            background-color: #ff6600;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
        }

        /* Ensuring fixed header and elements */
        .products, .kategori, .search, .banner {
            margin-top: 180px;
        }

        /* Cart and Login */
        #cartBox {
            position: fixed;
            top: 0;
            right: -100%;
            width: 300px;
            height: 100%;
            background-color: white;
            box-shadow: -3px 0 10px rgba(0, 0, 0, 0.3);
            padding: 15px;
            transition: 0.3s;
        }

        .cart-header {
            font-weight: bold;
            margin-bottom: 20px;
        }

        #cartItems {
            margin-bottom: 20px;
        }

        #totalCart {
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Medanshoping</div>
    <div class="menu">
        <div class="btn">❤️</div>
        <div class="btn" onclick="bukaCart()">Keranjang (0)</div>
        <div class="btn" onclick="window.location.href='login.html'">Login</div>
    </div>
</header>

<div class="banner">
    🔥 Promo Medanshoping Diskon Sampai 70%!
</div>

<div class="search">
    <input type="text" placeholder="Cari produk..." id="search" onkeyup="cariProduk()">
</div>

<div class="kategori">
    <button onclick="filterKategori('all')">Semua</button>
    <button onclick="filterKategori('fashion')">Fashion</button>
    <button onclick="filterKategori('tas')">Tas</button>
    <button onclick="filterKategori('sepatu')">Sepatu</button>
</div>

<div class="products" id="productList">
    <!-- Example Product Card -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500" alt="Baju Fashion">
        <h3>Baju Fashion</h3>
        <div class="rating">⭐ 4.5</div>
        <div class="price">Rp 120.000</div>
        <div class="qty">
            <button onclick="kurangProduk(0)">-</button>
            <input type="number" id="qty0" value="1">
            <button onclick="tambahProduk(0)">+</button>
        </div>
        <button class="btn" onclick="beliProduk(0)">Tambah Keranjang</button>
    </div>

    <!-- More product cards here -->
</div>

<div id="cartBox">
    <div class="cart-header">Keranjang</div>
    <div id="cartItems"></div>
    <div id="totalCart">Total: Rp0</div>
    <button class="btn" onclick="tutupCart()">Tutup</button>
</div>

<script>
    let produk = [
        {nama: "Baju Fashion", kategori: "fashion", harga: 120000, rating: 4.5, gambar: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500"},
        {nama: "Tas Wanita", kategori: "tas", harga: 150000, rating: 4.6, gambar: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500"},
        {nama: "Sepatu Trend", kategori: "sepatu", harga: 200000, rating: 4.7, gambar: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500"},
        {nama: "Jaket Pria", kategori: "fashion", harga: 250000, rating: 4.8, gambar: "https://images.unsplash.com/photo-1520975661595-6453be3f7070?w=500"}
    ];
    
    let keranjang = [];
    
    function tampilProduk(data) {
        let html = "";
        data.forEach((produk, index) => {
            html += `
                <div class="card">
                    <img src="${produk.gambar}" alt="${produk.nama}">
                    <h3>${produk.nama}</h3>
                    <div class="rating">⭐ ${produk.rating}</div>
                    <div class="price">Rp ${produk.harga.toLocaleString()}</div>
                    <div class="qty">
                        <button onclick="kurangProduk(${index})">-</button>
                        <input type="number" id="qty${index}" value="1" min="1">
                        <button onclick="tambahProduk(${index})">+</button>
                    </div>
                    <button class="btn" onclick="beliProduk(${index})">Tambah Keranjang</button>
                </div>
            `;
        });
        document.getElementById('productList').innerHTML = html;
    }
    
    function filterKategori(kategori) {
        if (kategori === 'all') {
            tampilProduk(produk);
        } else {
            let filteredProduk = produk.filter(p => p.kategori === kategori);
            tampilProduk(filteredProduk);
        }
    }
    
    function beliProduk(index) {
        let qty = parseInt(document.getElementById(`qty${index}`).value);
        let item = keranjang.find(p => p.nama === produk[index].nama);
        if (item) {
            item.qty += qty;
        } else {
            keranjang.push({...produk[index], qty: qty});
        }
        updateCart();
    }

    function updateCart() {
        let html = "";
        let total = 0;
        let jumlah = 0;
        keranjang.forEach((item) => {
            let subtotal = item.qty * item.harga;
            total += subtotal;
            jumlah += item.qty;
            html += `
                <div>${item.nama} x ${item.qty} - Rp ${subtotal.toLocaleString()}</div>
            `;
        });
        document.getElementById('cartItems').innerHTML = html;
        document.getElementById('totalCart').innerHTML = `Total: Rp ${total.toLocaleString()}`;
        document.querySelector('.btn').innerText = `Tambah Keranjang (${jumlah})`;
    }

    function bukaCart() {
        document.getElementById('cartBox').style.right = "0";
    }

    function tutupCart() {
        document.getElementById('cartBox').style.right = "-100%";
    }
    
    tampilProduk(produk);  // Initial product display
</script>

</body>
</html>
