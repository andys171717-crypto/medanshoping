<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TembungShoping</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:system-ui;
background:#f3f4f6;
padding-top:65px;
padding-bottom:80px;
}

/* HEADER */

.header{
position:fixed;
top:0;
width:100%;
height:60px;
background:linear-gradient(90deg,#ff6a00,#ff3d00);
display:flex;
align-items:center;
gap:8px;
padding:0 10px;
z-index:999;
}

.search{
flex:1;
height:36px;
border:none;
border-radius:20px;
padding:0 12px;
outline:none;
}

.icon{
color:white;
font-size:20px;
position:relative;
padding:6px;
}

.badge{
position:absolute;
top:-5px;
right:-6px;
background:red;
color:white;
font-size:10px;
padding:2px 6px;
border-radius:50%;
}

/* BANNER */

.banner{
margin:10px;
border-radius:12px;
overflow:hidden;
}

.banner img{
width:100%;
height:140px;
object-fit:cover;
}

/* CATEGORY */

.category{
display:flex;
overflow-x:auto;
gap:14px;
padding:10px;
background:white;
}

.cat{
text-align:center;
min-width:65px;
font-size:12px;
}

.circle{
width:45px;
height:45px;
border-radius:50%;
background:#eef1f4;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
margin:auto;
margin-bottom:4px;
}

/* FLASH */

.flash{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
}

.flash-products{
display:flex;
gap:10px;
overflow-x:auto;
}

.flash-item{
min-width:120px;
background:white;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.flash-item img{
width:100%;
height:100px;
object-fit:cover;
border-radius:10px 10px 0 0;
}

.flash-price{
padding:6px;
color:#e74c3c;
font-weight:bold;
}

/* PRODUCTS */

.products{
padding:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.product{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.product img{
width:100%;
height:160px;
object-fit:cover;
}

.info{
padding:10px;
}

.title{
font-size:14px;
font-weight:bold;
height:34px;
overflow:hidden;
}

.price{
color:#e74c3c;
font-size:18px;
font-weight:bold;
}

.rating{
font-size:12px;
color:#f1c40f;
}

.actions{
display:flex;
gap:6px;
padding:10px;
}

.btn{
flex:1;
border:none;
padding:8px;
border-radius:8px;
color:white;
}

.like{background:#e74c3c;}
.chat{background:#3498db;}
.cartbtn{background:#27ae60;}

/* DETAIL */

.detail{
display:none;
padding:10px;
}

.detail img{
width:100%;
border-radius:10px;
}

.detail-title{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.detail-price{
font-size:22px;
color:#e74c3c;
font-weight:bold;
}

/* CART */

.cartpage{
display:none;
padding:10px;
}

.cart-item{
background:white;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

/* BOTTOM NAV */

.bottom{
position:fixed;
bottom:0;
width:100%;
height:70px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -3px 10px rgba(0,0,0,0.15);
font-size:13px;
}

.bottom i{
font-size:22px;
display:block;
margin-bottom:4px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<input class="search" placeholder="Cari produk di TembungShoping">

<div class="icon" onclick="openCart()">
<i class="fa-solid fa-cart-shopping"></i>
<span class="badge" id="cartcount">0</span>
</div>

</div>

<!-- BANNER -->

<div class="banner">
<img src="https://images.unsplash.com/photo-1607082349566-187342175e2f?w=900">
</div>

<!-- CATEGORY -->

<div class="category">

<div class="cat"><div class="circle">📱</div>Pulsa</div>
<div class="cat"><div class="circle">🔥</div>Promo</div>
<div class="cat"><div class="circle">🎮</div>Game</div>
<div class="cat"><div class="circle">👕</div>Fashion</div>
<div class="cat"><div class="circle">💄</div>Beauty</div>
<div class="cat"><div class="circle">📦</div>Lainnya</div>

</div>

<!-- FLASH SALE -->

<div class="flash">

<b>🔥 Flash Sale</b>

<div class="flash-products">

<div class="flash-item">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400">
<div class="flash-price">Rp80.000</div>
</div>

<div class="flash-item">
<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400">
<div class="flash-price">Rp150.000</div>
</div>

</div>

</div>

<!-- PRODUCTS -->

<div class="products" id="productList"></div>

<!-- DETAIL -->

<div class="detail" id="detailPage">

<button onclick="home()">⬅ kembali</button>

<img id="dimg">

<div class="detail-title" id="dtitle"></div>

<div class="detail-price" id="dprice"></div>

<button onclick="addCart(selected)"
style="width:100%;padding:12px;background:#27ae60;color:white;border:none;border-radius:10px">
Tambah Keranjang
</button>

</div>

<!-- CART -->

<div class="cartpage" id="cartPage">

<h3>Keranjang</h3>

<div id="cartItems"></div>

</div>

<!-- BOTTOM -->

<div class="bottom">

<div onclick="home()">
<i class="fa-solid fa-house"></i>
Home
</div>

<div>
<i class="fa-solid fa-fire"></i>
Promo
</div>

<div onclick="openCart()">
<i class="fa-solid fa-cart-shopping"></i>
Cart
</div>

<div>
<i class="fa-solid fa-user"></i>
Akun
</div>

</div>

<script>

/* DATA PRODUK */

let productData=[

{
name:"Sepatu Nike Sport",
price:100000,
img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400"
},

{
name:"Headphone Wireless",
price:200000,
img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400"
},

{
name:"Smartwatch",
price:150000,
img:"https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b?w=400"
},

{
name:"Tas Fashion Wanita",
price:250000,
img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400"
}

];

let cart=[];
let selected=0;

/* FORMAT RUPIAH */

function rupiah(x){
return "Rp"+x.toLocaleString();
}

/* LOAD PRODUK */

function loadProducts(){

let html="";

productData.forEach((p,i)=>{

html+=`

<div class="product">

<img src="${p.img}" onclick="openDetail(${i})">

<div class="info">

<div class="title">${p.name}</div>

<div class="rating">⭐ ⭐ ⭐ ⭐ ☆</div>

<div class="price">${rupiah(p.price)}</div>

</div>

<div class="actions">

<button class="btn like">
<i class="fa-solid fa-heart"></i>
</button>

<button class="btn chat">
<i class="fa-solid fa-comment"></i>
</button>

<button class="btn cartbtn"
onclick="addCart(${i})">
<i class="fa-solid fa-cart-shopping"></i>
</button>

</div>

</div>

`;

});

document.getElementById("productList").innerHTML=html;

}

loadProducts();

/* DETAIL */

function openDetail(i){

selected=i;

document.getElementById("productList").style.display="none";
document.getElementById("detailPage").style.display="block";
document.getElementById("cartPage").style.display="none";

let p=productData[i];

dimg.src=p.img;
dtitle.innerText=p.name;
dprice.innerText=rupiah(p.price);

}

/* CART */

function addCart(i){

cart.push(productData[i]);

document.getElementById("cartcount").innerText=cart.length;

alert("Produk masuk keranjang");

}

function openCart(){

document.getElementById("productList").style.display="none";
document.getElementById("detailPage").style.display="none";
document.getElementById("cartPage").style.display="block";

let html="";

cart.forEach(c=>{

html+=`

<div class="cart-item">
${c.name}<br>
<b>${rupiah(c.price)}</b>
</div>

`;

});

document.getElementById("cartItems").innerHTML=html;

}

/* HOME */

function home(){

document.getElementById("productList").style.display="grid";
document.getElementById("detailPage").style.display="none";
document.getElementById("cartPage").style.display="none";

}

</script>

</body>
</html>
