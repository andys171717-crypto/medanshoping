<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TembungShoping</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
padding-top:75px;
padding-bottom:80px;
}

.header{
background:#2c3e50;
padding:12px;
display:flex;
align-items:center;
gap:12px;
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

.search{
flex:1;
height:40px;
padding:0 15px;
border-radius:20px;
border:none;
}

.icon{
font-size:24px;
color:white;
cursor:pointer;
position:relative;
}

.cart-count{
position:absolute;
top:-6px;
right:-10px;
background:red;
color:white;
font-size:12px;
padding:2px 6px;
border-radius:50%;
}

.menu{
display:grid;
grid-template-columns:repeat(5,1fr);
background:white;
padding:10px;
text-align:center;
}

.circle{
width:45px;
height:45px;
background:#3b4f63;
border-radius:50%;
margin:auto;
margin-bottom:5px;
}

.products{
padding:12px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.product{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.product img{
width:100%;
height:160px;
object-fit:cover;
cursor:pointer;
}

.info{
padding:10px;
}

.rating{color:#ffb400;}
.sold{font-size:12px;color:#777;}
.free{font-size:11px;color:#27ae60;font-weight:bold;}

.price{
color:#e74c3c;
font-size:18px;
font-weight:bold;
margin:5px 0;
}

/* tombol chat + keranjang */

.actions{
display:flex;
gap:6px;
padding:8px;
}

.chat-btn{
flex:1;
background:#3498db;
color:white;
border:none;
border-radius:8px;
padding:8px;
font-size:18px;
}

.cart-btn{
flex:1;
background:#27ae60;
color:white;
border:none;
border-radius:8px;
padding:8px;
font-size:18px;
}

/* qty */

.qty-control{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
padding:8px;
}

.qty-control button{
width:35px;
height:35px;
border:none;
background:#27ae60;
color:white;
border-radius:8px;
font-size:18px;
}

.qty-input{
width:40px;
text-align:center;
border:none;
background:#eee;
border-radius:6px;
height:30px;
}

/* cart */

.cart-popup{
position:fixed;
top:0;
right:-100%;
width:80%;
height:100%;
background:white;
padding:20px;
overflow:auto;
transition:0.3s;
}

.cart-popup.active{
right:0;
}

.cart-item{
border-bottom:1px solid #eee;
padding:10px 0;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
height:65px;
box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

.bottom div{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
}

.icon-bottom{font-size:22px;}

</style>
</head>

<body>

<div class="header">

<input class="search" id="search" placeholder="Cari produk di TembungShoping">

<div class="icon" onclick="toggleCart()">🛒
<span id="cartcount" class="cart-count">0</span>
</div>

<div class="icon" onclick="chatAdmin()">💬</div>

</div>

<div class="menu">
<div><div class="circle"></div>Pulsa</div>
<div><div class="circle"></div>Promo</div>
<div><div class="circle"></div>Game</div>
<div><div class="circle"></div>Live</div>
<div><div class="circle"></div>Lainnya</div>
</div>

<div class="products" id="products"></div>

<div class="cart-popup" id="cartpopup">

<button onclick="toggleCart()">Tutup</button>
<h2>Keranjang</h2>

<div id="cartitems"></div>

</div>

<div class="bottom">
<div><span class="icon-bottom">🏠</span>Beranda</div>
<div><span class="icon-bottom">📺</span>Live</div>
<div><span class="icon-bottom">🔔</span>Notifikasi</div>
<div><span class="icon-bottom">👤</span>Akun</div>
</div>

<script>

const produk=[
{nama:"Sepatu Nike Sport",harga:100000,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400",sold:"1.2k"},
{nama:"Headphone Wireless",harga:200000,img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400",sold:"950"},
{nama:"Jam Tangan Smartwatch",harga:150000,img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400",sold:"870"},
{nama:"Tas Fashion Wanita",harga:180000,img:"https://images.unsplash.com/photo-1591561954557-26941169b49e?w=400",sold:"640"},
{nama:"Kacamata Fashion",harga:90000,img:"https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=400",sold:"520"},
{nama:"Parfum Coco Chanel",harga:120000,img:"https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=400",sold:"430"},
{nama:"Smartphone Premium",harga:80000,img:"https://images.unsplash.com/photo-1580910051074-3eb694886505?w=400",sold:"390"},
{nama:"PC Gaming RGB",harga:70000,img:"https://images.unsplash.com/photo-1587202372775-e229f172b9d7?w=400",sold:"210"}
]

let cart=[]

function rupiah(x){
return Number(x).toLocaleString("id-ID")
}

function tampilProduk(){

let html=""

produk.forEach((p,i)=>{

html+=`

<div class="product">

<img src="${p.img}">

<div class="info">

<b>${p.nama}</b>

<div class="rating">⭐⭐⭐⭐☆</div>

<div class="sold">Terjual ${p.sold}</div>

<div class="free">Gratis Ongkir</div>

<div class="price">Rp${rupiah(p.harga)}</div>

</div>

<div class="actions">

<button class="chat-btn" onclick="chatAdmin()">💬</button>

<button class="cart-btn" onclick="plusQty(${i})">🛒</button>

</div>

<div class="qty-control">

<button onclick="minusQty(${i})">-</button>

<input class="qty-input" id="qty${i}" value="0">

<button onclick="plusQty(${i})">+</button>

</div>

</div>

`

})

document.getElementById("products").innerHTML=html

}

function plusQty(i){

cart.push(produk[i])

document.getElementById("qty"+i).value++

renderCart()

}

function minusQty(i){

if(document.getElementById("qty"+i).value>0){

document.getElementById("qty"+i).value--

cart.pop()

renderCart()

}

}

function renderCart(){

let html=""

cart.forEach(i=>{
html+=`<div class="cart-item">${i.nama}</div>`
})

document.getElementById("cartitems").innerHTML=html

document.getElementById("cartcount").innerText=cart.length

}

function toggleCart(){

document.getElementById("cartpopup").classList.toggle("active")

}

function chatAdmin(){

window.open("https://wa.me/6281220549530")

}

tampilProduk()

</script>

</body>
</html>
