<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TembungShoping</title><style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* HEADER */

.header{
background:#2c3e50;
padding:10px;
display:flex;
align-items:center;
}

.search{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}

.carticon{
color:white;
font-size:22px;
margin-left:10px;
cursor:pointer;
position:relative;
}

.badge{
background:red;
color:white;
border-radius:50%;
font-size:12px;
padding:2px 6px;
position:absolute;
top:-5px;
right:-8px;
}

/* KATEGORI */

.kategori{
display:flex;
overflow:auto;
background:white;
padding:10px;
}

.kategori div{
text-align:center;
margin-right:15px;
font-size:14px;
}

.circle{
width:50px;
height:50px;
border-radius:50%;
background:#34495e;
margin:auto;
}

/* PRODUK */

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card h3{
margin:8px;
font-size:18px;
}

.price{
color:#e74c3c;
font-weight:bold;
margin-left:8px;
}

.star{
color:#f1c40f;
margin-left:8px;
}

.btn{
background:#27ae60;
color:white;
border:none;
padding:10px;
width:90%;
margin:10px;
border-radius:8px;
cursor:pointer;
}

/* KERANJANG */

.cartpage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
flex-direction:column;
}

.cartheader{
display:flex;
align-items:center;
background:#2c3e50;
color:white;
padding:10px;
}

.backbtn{
margin-right:10px;
cursor:pointer;
}

.cartitems{
flex:1;
overflow:auto;
padding:10px;
}

.checkout{
background:#27ae60;
color:white;
border:none;
padding:15px;
margin:10px;
border-radius:10px;
font-size:16px;
}

/* MENU BAWAH */

.bottom{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:8px 0;
border-top:1px solid #ddd;
}

.bottom div{
text-align:center;
font-size:14px;
cursor:pointer;
}

</style></head><body><!-- HEADER --><div class="header">
<input class="search" id="search" onkeyup="searchProduk()" placeholder="Cari produk di TembungShoping">
<div class="carticon" onclick="openCart()">🛒
<span class="badge" id="cartcount">0</span>
</div>
</div><!-- KATEGORI --><div class="kategori">
<div><div class="circle"></div>Pulsa</div>
<div><div class="circle"></div>Promo</div>
<div><div class="circle"></div>Game</div>
<div><div class="circle"></div>Live</div>
<div><div class="circle"></div>Lainnya</div>
</div><!-- PRODUK --><div class="container" id="produklist"><div class="card produk">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h3>Sepatu Sport</h3>
<div class="star">⭐⭐⭐⭐☆</div>
<div class="price">Rp100.000</div>
<button class="btn" onclick="addCart('Sepatu Sport','100000')">Tambah Keranjang</button>
</div><div class="card produk">
<img src="https://images.unsplash.com/photo-1518443895914-2c3cc8a6d2aa">
<h3>Headphone Gaming</h3>
<div class="star">⭐⭐⭐⭐☆</div>
<div class="price">Rp200.000</div>
<button class="btn" onclick="addCart('Headphone Gaming','200000')">Tambah Keranjang</button>
</div><div class="card produk">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
<h3>Jam Tangan</h3>
<div class="star">⭐⭐⭐⭐☆</div>
<div class="price">Rp150.000</div>
<button class="btn" onclick="addCart('Jam Tangan','150000')">Tambah Keranjang</button>
</div><div class="card produk">
<img src="https://images.unsplash.com/photo-1590874103328-eac38a683ce7">
<h3>Tas Fashion</h3>
<div class="star">⭐⭐⭐⭐☆</div>
<div class="price">Rp180.000</div>
<button class="btn" onclick="addCart('Tas Fashion','180000')">Tambah Keranjang</button>
</div></div><!-- HALAMAN KERANJANG --><div class="cartpage" id="cartpage"><div class="cartheader">
<div class="backbtn" onclick="closeCart()">⬅</div>
<h3>Keranjang</h3>
</div><div class="cartitems" id="cartitems"></div><button class="checkout" onclick="checkout()">Checkout</button>

</div><!-- MENU BAWAH --><div class="bottom">
<div onclick="scrollTop()">🏠<br>Beranda</div>
<div>📺<br>Live</div>
<div>🔔<br>Notif</div>
<div>👤<br>Akun</div>
</div><script>

let cart=[];

function addCart(nama,harga){

cart.push({nama,harga});

updateCart();

alert("Produk ditambahkan ke keranjang");

}

function updateCart(){

document.getElementById("cartcount").innerText=cart.length;

let html="";

cart.forEach((item,i)=>{

html+=`
<p>${item.nama} - Rp${item.harga}</p>
`;

});

document.getElementById("cartitems").innerHTML=html;

}

function openCart(){

document.getElementById("cartpage").style.display="flex";

}

function closeCart(){

document.getElementById("cartpage").style.display="none";

}

function checkout(){

let pesan="Halo saya ingin order:%0A";

cart.forEach(i=>{
pesan+=i.nama+" - Rp"+i.harga+"%0A";
});

window.open("https://wa.me/6280000000000?text="+pesan);

}

function searchProduk(){

let input=document.getElementById("search").value.toLowerCase();

let produk=document.querySelectorAll(".produk");

produk.forEach(p=>{

let nama=p.innerText.toLowerCase();

p.style.display=nama.includes(input)?"block":"none";

});

}

</script></body>
</html>
