<script>

let produk=[

{nama:"Sepatu Sport",harga:100000,img:"https://picsum.photos/300?1"},
{nama:"Headphone Gaming",harga:200000,img:"https://picsum.photos/300?2"},
{nama:"Jam Tangan",harga:150000,img:"https://picsum.photos/300?3"},
{nama:"Tas Fashion",harga:180000,img:"https://picsum.photos/300?4"},

{nama:"Laptop Gaming",harga:8500000,img:"https://picsum.photos/300?5"},
{nama:"Mouse Gaming",harga:120000,img:"https://picsum.photos/300?6"},
{nama:"Keyboard RGB",harga:350000,img:"https://picsum.photos/300?7"},
{nama:"Smartphone Android",harga:2500000,img:"https://picsum.photos/300?8"},

{nama:"Kamera Digital",harga:3200000,img:"https://picsum.photos/300?9"},
{nama:"Speaker Bluetooth",harga:450000,img:"https://picsum.photos/300?10"},
{nama:"Power Bank",harga:95000,img:"https://picsum.photos/300?11"},
{nama:"Kacamata Fashion",harga:80000,img:"https://picsum.photos/300?12"}

]

let cart=[]

function rupiah(x){
return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".")
}

function tampilProduk(){

let container=document.getElementById("products")
container.innerHTML=""

produk.forEach((p,i)=>{

let card=document.createElement("div")
card.className="product"

card.innerHTML=`

<img src="${p.img}">

<div class="info">

<b>${p.nama}</b>

<div class="rating">⭐⭐⭐⭐☆</div>

<div class="price">Rp${rupiah(p.harga)}</div>

<button class="btncart">Tambah Keranjang</button>

</div>

`

card.onclick=function(){
detail(i)
}

card.querySelector(".btncart").onclick=function(e){
e.stopPropagation()
addcart(p.nama,p.harga)
}

container.appendChild(card)

})

}

function addcart(nama,harga){

cart.push({nama,harga})
updateCart()

alert("Produk ditambahkan ke keranjang")

}

function updateCart(){

document.getElementById("cartcount").innerText=cart.length

let items=""
let total=0

cart.forEach(p=>{
items+=`<div>${p.nama} - Rp${rupiah(p.harga)}</div>`
total+=p.harga
})

document.getElementById("cartitems").innerHTML=items
document.getElementById("total").innerText="Total: Rp"+rupiah(total)

}

function toggleCart(){
document.getElementById("cartpopup").classList.toggle("active")
}

let detailNama
let detailHarga

function detail(i){

let p=produk[i]

detailNama=p.nama
detailHarga=p.harga

document.getElementById("detailimg").src=p.img
document.getElementById("detailname").innerText=p.nama
document.getElementById("detailprice").innerText="Rp"+rupiah(p.harga)

document.getElementById("detail").style.display="block"

}

function closeDetail(){
document.getElementById("detail").style.display="none"
}

function checkout(){

let nomor="6281220549530"
let text="Halo TembungShoping,%0ASaya ingin memesan:%0A%0A"
let total=0

cart.forEach(p=>{
text+=p.nama+" - Rp"+rupiah(p.harga)+"%0A"
total+=p.harga
})

text+="%0ATotal: Rp"+rupiah(total)

window.open("https://wa.me/"+nomor+"?text="+text)

cart=[]
updateCart()

}

function chatAdmin(){
window.open("https://wa.me/6281220549530")
}

document.getElementById("search").addEventListener("keyup",function(){

let input=this.value.toLowerCase()
let cards=document.querySelectorAll(".product")

cards.forEach(c=>{
let text=c.innerText.toLowerCase()
c.style.display=text.includes(input)?"":"none"
})

})

tampilProduk()

</script>
