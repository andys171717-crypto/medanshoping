<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TembungShoping</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f5f5f5;
padding-top:60px;
padding-bottom:70px;
}

/* HEADER */

.header{
position:fixed;
top:0;
width:100%;
height:56px;
background:#ff5722;
display:flex;
align-items:center;
padding:0 10px;
box-sizing:border-box;
z-index:999;
}

/* SEARCH */

.search-box{
flex:1;
background:white;
border-radius:18px;
display:flex;
align-items:center;
padding:0 10px;
height:34px;
}

.search-box i{
color:#999;
font-size:13px;
}

.search{
flex:1;
border:none;
outline:none;
font-size:13px;
margin-left:6px;
}

/* HEADER ICON */

.header-icons{
display:flex;
gap:16px;
margin-left:10px;
}

.icon{
color:white;
font-size:20px;
position:relative;
}

.badge{
position:absolute;
top:-5px;
right:-7px;
background:red;
color:white;
font-size:10px;
padding:2px 5px;
border-radius:50%;
}

/* BANNER */

.banner{
overflow:hidden;
}

.banner img{
width:100%;
height:150px;
object-fit:cover;
}

/* CATEGORY */

.category{
display:flex;
gap:16px;
padding:12px;
background:white;
overflow-x:auto;
}

.cat{
text-align:center;
font-size:11px;
min-width:65px;
}

.circle{
width:46px;
height:46px;
border-radius:50%;
background:#f0f0f0;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
margin:auto;
margin-bottom:4px;
}

/* PRODUCTS */

.products{
padding:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.product{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.product img{
width:100%;
height:130px;
object-fit:cover;
}

.info{
padding:8px;
}

.title{
font-size:13px;
font-weight:bold;
margin-bottom:2px;
}

.rating{
font-size:11px;
color:#ffc107;
}

.price{
font-size:16px;
font-weight:bold;
color:#ff5722;
}

/* ACTION BUTTON */

.actions{
display:flex;
gap:6px;
padding:8px;
}

.btn{
flex:1;
height:30px;
border:none;
border-radius:6px;
color:white;
font-size:13px;
}

.like{background:#e53935;}
.chat{background:#3498db;}
.cartbtn{background:#27ae60;}

/* DETAIL */

.detail{
display:none;
padding:12px;
}

.detail img{
width:100%;
border-radius:10px;
}

.detail-title{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.detail-price{
font-size:22px;
color:#ff5722;
font-weight:bold;
}

/* CART */

.cartpage{
display:none;
padding:12px;
}

.cart-item{
background:white;
padding:10px;
border-radius:8px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
}

.remove{
background:red;
color:white;
border:none;
padding:5px 8px;
border-radius:5px;
}

/* CHECKOUT */

.checkout-btn{
width:100%;
padding:12px;
background:#ff5722;
color:white;
border:none;
border-radius:8px;
margin-top:10px;
}

/* BOTTOM NAV */

.bottom{
position:fixed;
bottom:0;
width:100%;
height:60px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -2px 8px rgba(0,0,0,0.15);
font-size:12px;
}

.bottom i{
font-size:18px;
display:block;
margin-bottom:2px;
}

</style>
</head>

<body>

<div class="header">

<div class="search-box">
<i class="fa fa-search"></i>
<input class="search" id="search" placeholder="Cari produk di TembungShoping">
</div>

<div class="header-icons">

<div class="icon">
<i class="fa-solid fa-bell"></i>
</div>

<div class="icon" onclick="openCart()">
<i class="fa-solid fa-cart-shopping"></i>
<span class="badge" id="cartcount">0</span>
</div>

</div>

</div>

<div class="banner">
<img id="bannerimg">
</div>

<div class="category">

<div class="cat"><div class="circle">📱</div>Pulsa</div>
<div class="cat"><div class="circle">🔥</div>Promo</div>
<div class="cat"><div class="circle">🎮</div>Game</div>
<div class="cat"><div class="circle">👕</div>Fashion</div>
<div class="cat"><div class="circle">💄</div>Beauty</div>

</div>

<div class="products" id="productList"></div>

<div class="detail" id="detailPage">

<button onclick="home()">⬅ kembali</button>

<img id="dimg">

<div class="detail-title" id="dtitle"></div>

<div class="detail-price" id="dprice"></div>

<button onclick="addCart(selected)"
style="width:100%;padding:12px;background:#27ae60;color:white;border:none;border-radius:10px">
Tambah Keranjang
</button>

</div>

<div class="cartpage" id="cartPage">

<h3>Keranjang</h3>

<div id="cartItems"></div>

<h3>Total: <span id="totalCart">Rp0</span></h3>

<button class="checkout-btn" onclick="checkout()">
Checkout
</button>

</div>

<div class="bottom">

<div onclick="home()">
<i class="fa-solid fa-house"></i>
Home
</div>

<div>
<i class="fa-solid fa-fire"></i>
Promo
</div>

<div onclick="openCart()">
<i class="fa-solid fa-cart-shopping"></i>
Cart
</div>

<div>
<i class="fa-solid fa-user"></i>
Akun
</div>

</div>

<script>

/* BANNER SLIDER */

let banners=[
"https://images.unsplash.com/photo-1607082349566-187342175e2f?w=900",
"https://images.unsplash.com/photo-1607083206968-13611e3d76db?w=900",
"https://images.unsplash.com/photo-1607082350899-7e105aa886ae?w=900"
]

let b=0

function slideBanner(){
b++
if(b>=banners.length){b=0}
bannerimg.src=banners[b]
}

bannerimg.src=banners[0]
setInterval(slideBanner,3000)

/* DATA PRODUK */

let productData=[

{name:"Sepatu Nike Sport",price:100000,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400"},
{name:"Headphone Wireless",price:200000,img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400"},
{name:"Smartwatch",price:150000,img:"https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b?w=400"},
{name:"Tas Fashion Wanita",price:250000,img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400"}

]

let cart=[]
let selected=0

function rupiah(x){
return "Rp"+x.toLocaleString()
}

function loadProducts(list=productData){

let html=""

list.forEach((p,i)=>{

html+=`

<div class="product">

<img src="${p.img}" onclick="openDetail(${i})">

<div class="info">

<div class="title">${p.name}</div>

<div class="rating">⭐ ⭐ ⭐ ⭐ ☆</div>

<div class="price">${rupiah(p.price)}</div>

</div>

<div class="actions">

<button class="btn like"><i class="fa fa-heart"></i></button>

<button class="btn chat"><i class="fa fa-comment"></i></button>

<button class="btn cartbtn" onclick="addCart(${i})">
<i class="fa fa-cart-shopping"></i>
</button>

</div>

</div>

`

})

productList.innerHTML=html

}

loadProducts()

search.addEventListener("input",function(){

let key=this.value.toLowerCase()

let result=productData.filter(p=>
p.name.toLowerCase().includes(key)
)

loadProducts(result)

})

function openDetail(i){

selected=i

productList.style.display="none"
detailPage.style.display="block"
cartPage.style.display="none"

let p=productData[i]

dimg.src=p.img
dtitle.innerText=p.name
dprice.innerText=rupiah(p.price)

}

function addCart(i){

cart.push(productData[i])
cartcount.innerText=cart.length

alert("Produk masuk keranjang")

}

function openCart(){

productList.style.display="none"
detailPage.style.display="none"
cartPage.style.display="block"

renderCart()

}

function renderCart(){

let html=""
let total=0

cart.forEach((c,i)=>{

html+=`

<div class="cart-item">

<div>
${c.name}<br>
<b>${rupiah(c.price)}</b>
</div>

<button class="remove"
onclick="removeCart(${i})">Hapus</button>

</div>

`

total+=c.price

})

cartItems.innerHTML=html
totalCart.innerText=rupiah(total)

}

function removeCart(i){

cart.splice(i,1)
cartcount.innerText=cart.length
renderCart()

}

function checkout(){

if(cart.length==0){
alert("Keranjang kosong")
return
}

alert("Checkout berhasil!")

cart=[]
cartcount.innerText=0

renderCart()
home()

}

function home(){

productList.style.display="grid"
detailPage.style.display="none"
cartPage.style.display="none"

loadProducts()

}

</script>

</body>
</html>
