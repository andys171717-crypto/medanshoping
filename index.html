<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TembungShoping</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
}

/* HEADER */

.header{
background:#34495e;
padding:12px;
display:flex;
align-items:center;
gap:10px;
}

.search{
flex:1;
background:white;
padding:8px 12px;
border-radius:20px;
border:none;
}

.icon{
color:white;
font-size:20px;
}

/* MENU ICON */

.menu{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
padding:15px;
background:white;
text-align:center;
}

.menu-item{
font-size:12px;
}

.menu-icon{
width:45px;
height:45px;
background:#34495e;
border-radius:50%;
margin:auto;
margin-bottom:5px;
}

/* BANNER */

.banner{
padding:10px;
}

.banner img{
width:100%;
border-radius:10px;
}

/* PRODUK */

.products{
padding:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
}

.product img{
width:100%;
border-radius:6px;
}

.price{
color:#e74c3c;
font-weight:bold;
}

/* BOTTOM MENU */

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 -2px 5px rgba(0,0,0,0.1);
}

.bottom div{
text-align:center;
font-size:12px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<input class="search" placeholder="Cari produk di TembungShoping">

<div class="icon">🛒</div>
<div class="icon">💬</div>

</div>

<!-- MENU -->

<div class="menu">

<div class="menu-item">
<div class="menu-icon"></div>
Pulsa
</div>

<div class="menu-item">
<div class="menu-icon"></div>
Promo
</div>

<div class="menu-item">
<div class="menu-icon"></div>
Game
</div>

<div class="menu-item">
<div class="menu-icon"></div>
Live
</div>

<div class="menu-item">
<div class="menu-icon"></div>
Lainnya
</div>

</div>

<!-- BANNER -->

<div class="banner">
<img src="https://via.placeholder.com/600x200">
</div>

<!-- PRODUK -->

<div class="products">

<div class="product">
<img src="https://via.placeholder.com/300">
<p>Produk 1</p>
<div class="price">Rp100.000</div>
</div>

<div class="product">
<img src="https://via.placeholder.com/300">
<p>Produk 2</p>
<div class="price">Rp200.000</div>
</div>

</div>

<!-- BOTTOM MENU -->

<div class="bottom">

<div>🏠<br>Beranda</div>
<div>📺<br>Live</div>
<div>🔔<br>Notif</div>
<div>👤<br>Akun</div>

</div>

</body>
</html>
