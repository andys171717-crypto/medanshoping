<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medanshoping</title>
    <style>
        /* Animasi Banner */
        @keyframes slideIn {
            0% {
                transform: translateX(100%);
            }

            100% {
                transform: translateX(0);
            }
        }

        .banner {
            background-color: #ffcc00;
            color: #ffffff;
            text-align: center;
            font-size: 24px;
            padding: 15px;
            animation: slideIn 2s ease-in-out;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-around;
            background-color: #ff6600;
            padding: 15px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            padding: 10px;
        }

        .navbar a:hover {
            background-color: #ff9900;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        /* Grid Layout untuk Produk */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .product-card {
            background-color: white;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: scale(1.05);
        }

        .product-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }

        /* Keranjang dan Fitur Quantity */
        .cart-btn {
            background-color: #ff6600;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .cart-btn:hover {
            background-color: #ff9900;
            transition: background-color 0.3s ease;
        }

        .quantity-controls button {
            background-color: #ff6600;
            color: white;
            padding: 5px;
            border: none;
            cursor: pointer;
        }

        .quantity-controls input {
            width: 40px;
            text-align: center;
        }

        /* Responsivitas */
        @media screen and (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }

            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }
    </style>
</head>

<body>

    <!-- Banner Promo -->
    <div class="banner">
        🔥 Promo Medanshoping Diskon Sampai 70%! 🔥
    </div>

    <!-- Navigation Menu -->
    <div class="navbar">
        <a href="#">Home</a>
        <a href="#">Produk</a>
        <a href="#">Kategori</a>
        <a href="#">Promo</a>
        <a href="#">Kontak</a>
    </div>

    <!-- Produk Grid -->
    <div class="product-grid">
        <div class="product-card" id="product-Baju-Fashion">
            <img class="product-img" src="product1.jpg" alt="Baju Fashion">
            <h3>Baju Fashion</h3>
            <p>Rp120.000</p>
            <div class="quantity-controls">
                <button onclick="updateQuantity('Baju Fashion', -1)">-</button>
                <input type="text" id="Baju-Fashion-quantity" value="1" readonly>
                <button onclick="updateQuantity('Baju Fashion', 1)">+</button>
            </div>
            <button class="cart-btn" onclick="addToCart('Baju Fashion', 120000)">Tambah Keranjang</button>
        </div>

        <div class="product-card" id="product-Tas-Wanita">
            <img class="product-img" src="product2.jpg" alt="Tas Wanita">
            <h3>Tas Wanita</h3>
            <p>Rp150.000</p>
            <div class="quantity-controls">
                <button onclick="updateQuantity('Tas Wanita', -1)">-</button>
                <input type="text" id="Tas-Wanita-quantity" value="1" readonly>
                <button onclick="updateQuantity('Tas Wanita', 1)">+</button>
            </div>
            <button class="cart-btn" onclick="addToCart('Tas Wanita', 150000)">Tambah Keranjang</button>
        </div>

        <div class="product-card" id="product-Sepatu-Trend">
            <img class="product-img" src="product3.jpg" alt="Sepatu Trend">
            <h3>Sepatu Trend</h3>
            <p>Rp200.000</p>
            <div class="quantity-controls">
                <button onclick="updateQuantity('Sepatu Trend', -1)">-</button>
                <input type="text" id="Sepatu-Trend-quantity" value="1" readonly>
                <button onclick="updateQuantity('Sepatu Trend', 1)">+</button>
            </div>
            <button class="cart-btn" onclick="addToCart('Sepatu Trend', 200000)">Tambah Keranjang</button>
        </div>

        <div class="product-card" id="product-Jaket-Pria">
            <img class="product-img" src="product4.jpg" alt="Jaket Pria">
            <h3>Jaket Pria</h3>
            <p>Rp250.000</p>
            <div class="quantity-controls">
                <button onclick="updateQuantity('Jaket Pria', -1)">-</button>
                <input type="text" id="Jaket-Pria-quantity" value="1" readonly>
                <button onclick="updateQuantity('Jaket Pria', 1)">+</button>
            </div>
            <button class="cart-btn" onclick="addToCart('Jaket Pria', 250000)">Tambah Keranjang</button>
        </div>
    </div>

    <!-- Keranjang -->
    <div id="cart" style="display: none;">
        <h2>Keranjang</h2>
        <ul id="cart-items">
            <!-- Cart items will be dynamically added here -->
        </ul>
        <button onclick="checkout()">Checkout</button>
    </div>

    <script>
        let cart = {};

        function addToCart(productName, price) {
            if (!cart[productName]) {
                cart[productName] = {
                    price: price,
                    quantity: parseInt(document.getElementById(productName + '-quantity').value)
                };
            } else {
                cart[productName].quantity += parseInt(document.getElementById(productName + '-quantity').value);
            }
            updateCart();
        }

        function updateQuantity(productName, change) {
            if (cart[productName]) {
                cart[productName].quantity += change;
                if (cart[productName].quantity <= 0) cart[productName].quantity = 1;
                document.getElementById(productName + '-quantity').value = cart[productName].quantity;
            }
        }

        function updateCart() {
            let cartItems = document.getElementById('cart-items');
            cartItems.innerHTML = '';
            let total = 0;
            for (let productName in cart) {
                let item = cart[productName];
                total += item.price * item.quantity;
                cartItems.innerHTML += `<li>${productName} x ${item.quantity} = Rp${item.price * item.quantity}</li>`;
                document.getElementById(productName + '-quantity').value = item.quantity;
            }

            document.getElementById('cart').style.display = total > 0 ? 'block' : 'none';
            document.querySelector('.navbar a:last-child').textContent = `Keranjang (${Object.values(cart).reduce((acc, item) => acc + item.quantity, 0)})`;
        }

        function checkout() {
            let total = 0;
            for (let productName in cart) {
                let item = cart[productName];
                total += item.price * item.quantity;
            }
            alert(`Total Pembayaran: Rp${total}`);
        }
    </script>
</body>

</html>
