<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TembungShoping</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
padding-top:70px;
padding-bottom:70px;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
background:#2c3e50;
padding:10px;
display:flex;
align-items:center;
gap:10px;
z-index:1000;
box-sizing:border-box;
}

.search{
flex:1;
height:38px;
border:none;
border-radius:20px;
padding:0 15px;
font-size:14px;
outline:none;
}

.icon{
color:white;
font-size:22px;
position:relative;
width:35px;
display:flex;
align-items:center;
justify-content:center;
}

/* BADGE */

.cart-count{
position:absolute;
top:-5px;
right:-5px;
background:#ff3b30;
color:white;
font-size:11px;
font-weight:bold;
min-width:18px;
height:18px;
display:flex;
align-items:center;
justify-content:center;
border-radius:20px;
padding:0 4px;
}

/* MENU ICON */

.menu{
background:white;
display:grid;
grid-template-columns:repeat(5,1fr);
text-align:center;
padding:10px 0;
font-size:13px;
}

.circle{
width:40px;
height:40px;
border-radius:50%;
background:#3b4f63;
margin:auto;
margin-bottom:5px;
}

/* PRODUK GRID */

.products{
padding:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.product{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
position:relative;
}

.product img{
width:100%;
height:160px;
object-fit:cover;
cursor:pointer;
}

.badge{
position:absolute;
top:8px;
left:8px;
background:#ff3b30;
color:white;
font-size:11px;
padding:3px 6px;
border-radius:6px;
}

.wishlist{
position:absolute;
top:8px;
right:8px;
background:white;
border-radius:50%;
padding:5px;
font-size:14px;
}

.info{
padding:10px;
}

.info b{
display:block;
font-size:16px;
margin-bottom:4px;
}

.rating{
color:#ffb400;
font-size:14px;
}

.sold{
font-size:12px;
color:#777;
}

.free{
font-size:12px;
color:#27ae60;
font-weight:bold;
margin:4px 0;
}

.price{
font-size:20px;
color:#e74c3c;
font-weight:bold;
margin:6px 0;
}

button{
width:100%;
background:#27ae60;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

/* CART POPUP */

.cart-popup{
position:fixed;
top:0;
right:-100%;
width:80%;
height:100%;
background:white;
padding:20px;
transition:0.3s;
overflow:auto;
z-index:2000;
}

.cart-popup.active{
right:0;
}

.close-cart{
background:#e74c3c;
margin-bottom:10px;
color:white;
border:none;
padding:8px 12px;
}

/* NOTIF */

.notif-item{
padding:10px;
border-bottom:1px solid #eee;
}

/* MENU BAWAH */

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
height:60px;
border-top:1px solid #eee;
z-index:1000;
}

.bottom div{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
color:#444;
width:25%;
position:relative;
}

.bottom span{
font-size:20px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<input class="search" id="search" placeholder="Cari produk di TembungShoping">

<div class="icon" onclick="toggleCart()">
🛒
<span id="cartcount" class="cart-count">0</span>
</div>

<div class="icon" onclick="chatAdmin()">💬</div>

</div>

<!-- MENU -->

<div class="menu">

<div><div class="circle"></div>Pulsa</div>
<div><div class="circle"></div>Promo</div>
<div><div class="circle"></div>Game</div>
<div><div class="circle"></div>Live</div>
<div><div class="circle"></div>Lainnya</div>

</div>

<!-- PRODUK -->

<div class="products" id="products"></div>

<!-- CART -->

<div class="cart-popup" id="cartpopup">

<button class="close-cart" onclick="toggleCart()">Tutup</button>

<h2>Keranjang</h2>

<div id="cartitems"></div>

</div>

<!-- NOTIF -->

<div class="cart-popup" id="notifpopup">

<button class="close-cart" onclick="toggleNotif()">Tutup</button>

<h2>Notifikasi</h2>

<div id="notifitems"></div>

</div>

<!-- MENU BAWAH -->

<div class="bottom">

<div onclick="menuHome()">
<span>🏠</span>
Beranda
</div>

<div>
<span>📺</span>
Live
</div>

<div onclick="toggleNotif()">
<span>🔔</span>
Notifikasi
<span id="notifcount" class="cart-count">0</span>
</div>

<div>
<span>👤</span>
Akun
</div>

</div>

<script>

const produk=[
{nama:"Sepatu Nike Sport",harga:100000,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400",sold:"1.2k"},
{nama:"Headphone Wireless",harga:200000,img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400",sold:"950"},
{nama:"Jam Tangan Smartwatch",harga:150000,img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400",sold:"870"},
{nama:"Tas Fashion Wanita",harga:180000,img:"https://images.unsplash.com/photo-1591561954557-26941169b49e?w=400",sold:"640"}
]

let cart=[]
let notif=[]

function rupiah(x){
return Number(x).toLocaleString("id-ID")
}

function tampilProduk(){

let html=""

produk.forEach(p=>{

html+=`

<div class="product">

<div class="badge">-30%</div>

<div class="wishlist">❤️</div>

<img src="${p.img}" loading="lazy">

<div class="info">

<b>${p.nama}</b>

<div class="rating">⭐⭐⭐⭐☆</div>

<div class="sold">Terjual ${p.sold}</div>

<div class="free">Gratis Ongkir</div>

<div class="price">Rp${rupiah(p.harga)}</div>

<button onclick="addcart('${p.nama}',${p.harga})">
Tambah Keranjang
</button>

</div>

</div>

`

})

document.getElementById("products").innerHTML=html

}

function addcart(nama,harga){

cart.push({nama,harga})

document.getElementById("cartcount").innerText=cart.length

notif.unshift({text:nama+" ditambahkan ke keranjang"})

updateNotif()

}

function toggleCart(){

document.getElementById("cartpopup").classList.toggle("active")

}

function toggleNotif(){

document.getElementById("notifpopup").classList.toggle("active")

}

function updateNotif(){

let html=""

notif.forEach(n=>{

html+=`<div class="notif-item">${n.text}</div>`

})

document.getElementById("notifitems").innerHTML=html

document.getElementById("notifcount").innerText=notif.length

}

function chatAdmin(){

window.open("https://wa.me/6281220549530")

}

function menuHome(){

document.getElementById("search").value=""

document.querySelectorAll(".product").forEach(p=>p.style.display="block")

window.scrollTo({top:0,behavior:"smooth"})

}

document.getElementById("search").addEventListener("keyup",function(){

let val=this.value.toLowerCase()

document.querySelectorAll(".product").forEach(card=>{

card.style.display=card.innerText.toLowerCase().includes(val)?"":"none"

})

})

tampilProduk()

</script>

</body>
</html>
